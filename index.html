<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micova — Stories With Purpose</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-base:       #08131c;
  --bg-card:       #0f1e2d;
  --bg-card-hover: #152336;
  --bg-nav:        #08131c;
  --bg-elevated:   #112030;
  --cyan:          #22d3ee;
  --cyan-dim:      #0891b2;
  --text-primary:  #f1f5f9;
  --text-secondary:#94a3b8;
  --text-muted:    #64748b;
  --border:        rgba(255,255,255,0.07);
  --border-card:   rgba(255,255,255,0.09);
  --font-serif:    'Playfair Display', Georgia, serif;
  --font-sans:     'Inter', system-ui, sans-serif;
}
html { scroll-behavior: smooth; }
body { background: var(--bg-base); color: var(--text-primary); font-family: var(--font-sans); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
img { display: block; width: 100%; }
button { font-family: var(--font-sans); cursor: pointer; }

/* ── NAV ── */
.nav { position: sticky; top: 0; z-index: 200; background: var(--bg-nav); border-bottom: 1px solid var(--border); height: 60px; display: flex; align-items: center; padding: 0 32px; transition: background .3s ease, border-color .3s ease, backdrop-filter .3s ease; }
.nav.scrolled { background: rgba(8,19,28,0.72); border-bottom-color: rgba(255,255,255,0.04); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
.nav-inner { max-width: 1280px; width: 100%; margin: 0 auto; display: flex; align-items: center; }
.nav-brand { display: flex; align-items: center; gap: 10px; margin-right: 40px; flex-shrink: 0; cursor: pointer; }
.nav-logo { width: 36px; height: 36px; border-radius: 50%; background: var(--cyan); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #08131c; }
.nav-brand-name { font-family: var(--font-serif); font-size: 18px; font-weight: 500; color: var(--text-primary); }
.nav-brand-tagline { font-size: 9px; font-weight: 500; letter-spacing: 0.14em; color: var(--text-muted); text-transform: uppercase; }
.nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
.nav-link { padding: 6px 14px; font-size: 14px; color: var(--text-secondary); border-radius: 6px; transition: color .15s; position: relative; cursor: pointer; }
.nav-link:hover { color: var(--text-primary); }
.nav-link.active { color: var(--text-primary); font-weight: 500; }
.nav-link.active::after { content: ''; position: absolute; bottom: -2px; left: 14px; right: 14px; height: 2px; background: var(--cyan); border-radius: 1px; }
.nav-actions { display: flex; align-items: center; gap: 8px; }
.nav-icon-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: color .15s, background .15s; }
.nav-icon-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.07); }
.nav-avatar { width: 34px; height: 34px; border-radius: 50%; background: #374151; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text-primary); cursor: pointer; border: 1.5px solid rgba(255,255,255,0.12); }

/* ── PAGES ── */
#app { min-height: calc(100vh - 60px); }

/* ── CONTAINER ── */
.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }

/* ── LOADER ── */
.page-loader { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 16px; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border-card); border-top-color: var(--cyan); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 13px; color: var(--text-muted); }

/* ── ERROR / NOT FOUND ── */
.error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 40px; gap: 16px; }
.error-page-code { font-family: var(--font-serif); font-size: 80px; font-weight: 700; color: var(--cyan); opacity: .3; line-height: 1; }
.error-page-title { font-family: var(--font-serif); font-size: 28px; color: var(--text-primary); }
.error-page-body { font-size: 15px; color: var(--text-secondary); max-width: 400px; line-height: 1.6; }
.btn-back { display: inline-flex; align-items: center; gap: 8px; background: var(--cyan); color: #08131c; padding: 11px 24px; border-radius: 100px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; margin-top: 8px; transition: opacity .15s; }
.btn-back:hover { opacity: .88; }

/* ── HOME HERO ── */
.hero { min-height: 520px; display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 0 0 0 32px; max-width: 1280px; margin: 0 auto; }
.hero-content { padding: 80px 48px 80px 0; }
.hero-eyebrow { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.hero-eyebrow-line { width: 28px; height: 2px; background: var(--cyan); }
.hero-eyebrow-text { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; color: var(--text-muted); text-transform: uppercase; }
.hero-tag { display: inline-block; padding: 4px 14px; border-radius: 100px; border: 1.5px solid rgba(34,211,238,0.4); color: var(--cyan); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 18px; }
.hero-title { font-family: var(--font-serif); font-size: clamp(42px,5vw,72px); font-weight: 700; line-height: 1.05; color: var(--text-primary); margin-bottom: 20px; }
.hero-subtitle { font-size: 16px; color: var(--text-secondary); line-height: 1.65; max-width: 420px; margin-bottom: 28px; }
.hero-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
.hero-meta-tag { font-size: 13px; color: var(--text-muted); }
.hero-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-muted); }
.hero-cta { display: inline-flex; align-items: center; gap: 10px; background: var(--cyan); color: #08131c; padding: 13px 28px; border-radius: 100px; font-size: 14px; font-weight: 600; transition: transform .15s, opacity .15s; cursor: pointer; border: none; }
.hero-cta:hover { opacity: .9; transform: translateY(-1px); }
.hero-image { height: 520px; overflow: hidden; position: relative; }
.hero-image img { width: 100%; height: 100%; object-fit: cover; }
.hero-image-overlay { position: absolute; inset: 0; background: linear-gradient(to right, #08131c 0%, transparent 30%); }

/* ── SECTION ── */
.section { padding: 64px 0; }
.section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 36px; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
.section-title { font-family: var(--font-serif); font-size: 38px; font-weight: 500; color: var(--text-primary); line-height: 1.1; }
.section-view-all { display: flex; align-items: center; gap: 6px; color: var(--cyan); font-size: 14px; font-weight: 500; white-space: nowrap; margin-bottom: 6px; cursor: pointer; transition: gap .15s; background: none; border: none; }
.section-view-all:hover { gap: 10px; }
.section-divider { border: none; border-top: 1px solid var(--border); margin: 0; }

/* ── ARTICLE CARDS ── */
.articles-layout { display: grid; grid-template-columns: 1fr 380px; gap: 48px; align-items: start; }
.articles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.article-card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 12px; overflow: hidden; transition: background .2s, transform .2s; cursor: pointer; }
.article-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
.article-card-image { aspect-ratio: 16/10; overflow: hidden; }
.article-card-image img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
.article-card:hover .article-card-image img { transform: scale(1.03); }
.article-card-body { padding: 18px 20px 22px; }
.article-card-tag { display: inline-block; padding: 3px 10px; border-radius: 4px; background: rgba(34,211,238,0.12); color: var(--cyan); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
.article-card-title { font-family: var(--font-serif); font-size: 19px; font-weight: 600; color: var(--text-primary); line-height: 1.3; margin-bottom: 8px; }
.article-card-excerpt { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.article-card-meta { font-size: 12px; color: var(--text-muted); }

/* ── MOST READ ── */
.most-read-list { display: flex; flex-direction: column; }
.most-read-item { display: flex; align-items: flex-start; gap: 20px; padding: 20px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .15s; }
.most-read-item:first-child { padding-top: 0; }
.most-read-item:last-child { border-bottom: none; }
.most-read-item:hover { opacity: .75; }
.most-read-num { font-family: var(--font-serif); font-size: 32px; font-weight: 700; color: var(--cyan); opacity: .7; line-height: 1; flex-shrink: 0; min-width: 40px; }
.most-read-cat { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
.most-read-title { font-family: var(--font-serif); font-size: 16px; font-weight: 600; color: var(--text-primary); line-height: 1.3; margin-bottom: 4px; }
.most-read-read { font-size: 12px; color: var(--text-muted); }

/* ── VIDEO CARDS ── */
.videos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
.video-card { border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; transition: transform .2s; }
.video-card:hover { transform: translateY(-3px); }
.video-card-thumb { aspect-ratio: 16/9; overflow: hidden; position: relative; }
.video-card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; filter: brightness(.75); }
.video-card:hover .video-card-thumb img { transform: scale(1.04); filter: brightness(.85); }
.video-duration { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,.8); color: #fff; font-size: 12px; font-weight: 500; padding: 3px 8px; border-radius: 4px; }
.video-card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 16px 16px; background: linear-gradient(to top, rgba(0,0,0,.88) 0%, transparent 100%); }
.video-card-cat { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cyan); margin-bottom: 5px; }
.video-card-title { font-family: var(--font-serif); font-size: 17px; font-weight: 600; color: #fff; line-height: 1.3; margin-bottom: 6px; }
.video-card-views { font-size: 12px; color: rgba(255,255,255,.6); }

/* ── THOUGHTS ── */
.thoughts-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
.thought-card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 14px; padding: 28px 26px 24px; cursor: pointer; transition: background .2s, transform .2s; display: flex; flex-direction: column; justify-content: space-between; min-height: 240px; }
.thought-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
.thought-quote-mark { font-family: var(--font-serif); font-size: 52px; line-height: .6; color: var(--cyan); opacity: .9; margin-bottom: 18px; display: block; }
.thought-text { font-family: var(--font-serif); font-size: 16px; color: var(--text-primary); line-height: 1.55; flex: 1; margin-bottom: 24px; }
.thought-author { display: flex; align-items: center; gap: 12px; padding-top: 18px; border-top: 1px solid var(--border); }
.thought-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #374151; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #94a3b8; }
.thought-avatar img { width: 100%; height: 100%; object-fit: cover; }
.thought-author-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.thought-author-date { font-size: 12px; color: var(--text-muted); }

/* ── STORIES GRID ── */
.stories-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
.story-card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: background .2s, transform .2s; }
.story-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
.story-card-image { aspect-ratio: 3/2; overflow: hidden; }
.story-card-image img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
.story-card:hover .story-card-image img { transform: scale(1.03); }
.story-card-body { padding: 18px 20px 22px; }
.story-card-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cyan); margin-bottom: 8px; }
.story-card-title { font-family: var(--font-serif); font-size: 18px; font-weight: 600; color: var(--text-primary); line-height: 1.3; margin-bottom: 8px; }
.story-card-meta { font-size: 12px; color: var(--text-muted); }

/* ── READER PAGE ── */
.reader-wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: grid; grid-template-columns: 1fr 340px; gap: 64px; align-items: start; padding-top: 48px; padding-bottom: 80px; }
.reader-main {}
.reader-sidebar { position: sticky; top: 80px; }

.reader-back { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 13px; font-weight: 500; background: none; border: none; cursor: pointer; margin-bottom: 32px; transition: color .15s; padding: 0; }
.reader-back:hover { color: var(--cyan); }
.reader-back svg { transition: transform .15s; }
.reader-back:hover svg { transform: translateX(-3px); }

.reader-cover { width: 100%; aspect-ratio: 21/9; object-fit: cover; border-radius: 12px; margin-bottom: 36px; }
.reader-cover-placeholder { width: 100%; aspect-ratio: 21/9; border-radius: 12px; margin-bottom: 36px; background: var(--bg-card); border: 1px solid var(--border-card); }

.reader-category { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--cyan); margin-bottom: 14px; }
.reader-title { font-family: var(--font-serif); font-size: clamp(32px,4vw,52px); font-weight: 700; line-height: 1.1; color: var(--text-primary); margin-bottom: 20px; letter-spacing: -0.01em; }
.reader-subtitle { font-size: 19px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 28px; font-style: italic; font-family: var(--font-serif); }

.reader-byline { display: flex; align-items: center; gap: 14px; padding: 20px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 32px; }
.reader-author-avatar { width: 44px; height: 44px; border-radius: 50%; background: #374151; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: var(--text-primary); }
.reader-author-avatar img { width: 100%; height: 100%; object-fit: cover; }
.reader-author-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
.reader-author-name a { color: var(--cyan); }
.reader-meta-row { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; flex-wrap: wrap; }
.reader-meta-dot { opacity: .5; }

.reader-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.reader-action-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 100px; border: 1px solid var(--border-card); background: var(--bg-card); color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
.reader-action-btn:hover { border-color: rgba(34,211,238,.4); color: var(--cyan); }
.reader-action-btn.active { background: rgba(34,211,238,.1); border-color: rgba(34,211,238,.4); color: var(--cyan); }
.reader-action-btn svg { flex-shrink: 0; }

/* ── ARTICLE BODY ── */
.reader-body { font-size: 18px; line-height: 1.8; color: var(--text-secondary); }
.reader-body p { margin-bottom: 1.6em; }
.reader-body h2 { font-family: var(--font-serif); font-size: 28px; font-weight: 600; color: var(--text-primary); margin: 2em 0 .8em; line-height: 1.2; }
.reader-body h3 { font-family: var(--font-serif); font-size: 22px; font-weight: 600; color: var(--text-primary); margin: 1.8em 0 .6em; }
.reader-body blockquote { border-left: 3px solid var(--cyan); padding: 4px 24px; margin: 2em 0; }
.reader-body blockquote p { font-family: var(--font-serif); font-size: 22px; font-style: italic; color: var(--text-primary); margin: 0; }
.reader-body strong { color: var(--text-primary); font-weight: 600; }
.reader-body a { color: var(--cyan); text-decoration: underline; text-underline-offset: 3px; }

/* ── VIDEO READER ── */
.video-embed-wrap { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 32px; }
.video-embed-wrap iframe { width: 100%; height: 100%; border: none; }
.video-embed-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--text-muted); font-size: 14px; background: var(--bg-card); }
.play-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(34,211,238,.15); border: 2px solid rgba(34,211,238,.4); display: flex; align-items: center; justify-content: center; }

/* ── THOUGHT READER ── */
.thought-reader { max-width: 800px; margin: 0 auto; padding: 48px 32px 80px; }
.thought-reader-quote { font-family: var(--font-serif); font-size: clamp(28px,4vw,48px); font-weight: 400; line-height: 1.35; color: var(--text-primary); margin-bottom: 48px; position: relative; padding: 0 0 0 32px; }
.thought-reader-quote::before { content: '"'; position: absolute; left: -8px; top: -20px; font-size: 120px; line-height: 1; color: var(--cyan); opacity: .25; font-family: var(--font-serif); }

/* ── CLAP SECTION ── */
.clap-section { display: flex; align-items: center; gap: 20px; padding: 32px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 48px 0; }
.clap-btn { display: flex; align-items: center; gap: 10px; background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 100px; padding: 12px 22px; color: var(--text-secondary); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s; }
.clap-btn:hover { border-color: rgba(34,211,238,.4); color: var(--cyan); background: rgba(34,211,238,.06); }
.clap-btn.clapped { border-color: rgba(34,211,238,.5); color: var(--cyan); background: rgba(34,211,238,.1); }
.clap-btn svg { transition: transform .2s; }
.clap-btn:hover svg { transform: scale(1.15); }
.clap-count { font-size: 13px; color: var(--text-muted); }

/* ── COMMENTS ── */
.comments-section { margin-top: 56px; }
.comments-title { font-family: var(--font-serif); font-size: 26px; font-weight: 600; color: var(--text-primary); margin-bottom: 28px; }
.comment-input-wrap { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 12px; padding: 16px; margin-bottom: 32px; }
.comment-input-row { display: flex; gap: 12px; align-items: flex-start; }
.comment-textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); font-size: 14px; font-family: var(--font-sans); resize: none; min-height: 72px; line-height: 1.6; }
.comment-textarea::placeholder { color: var(--text-muted); }
.comment-submit-row { display: flex; justify-content: flex-end; margin-top: 10px; gap: 10px; align-items: center; }
.comment-auth-note { font-size: 12px; color: var(--text-muted); }
.btn-submit { background: var(--cyan); color: #08131c; border: none; border-radius: 100px; padding: 9px 22px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
.btn-submit:hover { opacity: .88; }
.btn-submit:disabled { opacity: .4; cursor: not-allowed; }
.comment-list { display: flex; flex-direction: column; gap: 0; }
.comment-item { padding: 22px 0; border-bottom: 1px solid var(--border); }
.comment-item:last-child { border-bottom: none; }
.comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: #374151; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text-primary); }
.comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
.comment-author { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.comment-date { font-size: 12px; color: var(--text-muted); margin-left: auto; }
.comment-body { font-size: 14px; color: var(--text-secondary); line-height: 1.65; padding-left: 42px; }
.comments-empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

/* ── SIDEBAR WIDGETS ── */
.sidebar-widget { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 12px; padding: 22px; margin-bottom: 24px; }
.sidebar-widget-title { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 18px; }
.sidebar-post-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .15s; }
.sidebar-post-item:last-child { border-bottom: none; padding-bottom: 0; }
.sidebar-post-item:first-child { padding-top: 0; }
.sidebar-post-item:hover { opacity: .75; }
.sidebar-post-thumb { width: 60px; height: 48px; border-radius: 6px; overflow: hidden; flex-shrink: 0; background: var(--bg-elevated); }
.sidebar-post-thumb img { width: 100%; height: 100%; object-fit: cover; }
.sidebar-post-title { font-family: var(--font-serif); font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.35; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.sidebar-post-meta { font-size: 11px; color: var(--text-muted); }
.sidebar-most-read-item { display: flex; align-items: flex-start; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .15s; }
.sidebar-most-read-item:last-child { border-bottom: none; padding-bottom: 0; }
.sidebar-most-read-item:first-child { padding-top: 0; }
.sidebar-most-read-item:hover { opacity: .75; }
.sidebar-most-read-num { font-family: var(--font-serif); font-size: 22px; font-weight: 700; color: var(--cyan); opacity: .6; line-height: 1; flex-shrink: 0; min-width: 28px; }
.sidebar-most-read-title { font-size: 13px; font-weight: 500; color: var(--text-primary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* ── RELATED ── */
.related-section { margin-top: 64px; }
.related-title { font-family: var(--font-serif); font-size: 26px; font-weight: 600; margin-bottom: 24px; }
.related-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }

/* ── AUTH MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 16px; padding: 36px; width: 100%; max-width: 420px; }
.modal-title { font-family: var(--font-serif); font-size: 24px; font-weight: 600; margin-bottom: 6px; }
.modal-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
.modal-input { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border-card); border-radius: 8px; padding: 12px 14px; font-size: 14px; color: var(--text-primary); font-family: var(--font-sans); outline: none; margin-bottom: 12px; }
.modal-input:focus { border-color: rgba(34,211,238,.4); }
.modal-input::placeholder { color: var(--text-muted); }
.modal-btn { width: 100%; background: var(--cyan); color: #08131c; border: none; border-radius: 100px; padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: opacity .15s; }
.modal-btn:hover { opacity: .88; }
.modal-btn:disabled { opacity: .5; cursor: not-allowed; }
.modal-toggle { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
.modal-toggle span { color: var(--cyan); cursor: pointer; }
.modal-close { float: right; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 0; }
.modal-error { color: #f87171; font-size: 13px; margin-top: 8px; min-height: 18px; }

/* ── TOAST ── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 600; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--bg-elevated); border: 1px solid var(--border-card); border-radius: 10px; padding: 12px 18px; font-size: 13px; color: var(--text-primary); max-width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,.4); animation: toastIn .2s ease; }
.toast.success { border-left: 3px solid var(--cyan); }
.toast.error { border-left: 3px solid #f87171; }
@keyframes toastIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

/* ── READING PROGRESS ── */
.reading-progress { position: fixed; top: 60px; left: 0; right: 0; height: 2px; background: transparent; z-index: 150; }
.reading-progress-bar { height: 100%; background: var(--cyan); width: 0%; transition: width .1s linear; }

/* ── HAMBURGER ── */
.nav-hamburger { display: none; width: 36px; height: 36px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; padding: 0; }
.nav-hamburger span { display: block; width: 18px; height: 1.5px; background: currentColor; border-radius: 2px; transition: transform .2s, opacity .2s; }
.nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

/* ── MOBILE DRAWER ── */
.mobile-menu { display: none; position: fixed; inset: 60px 0 0 0; background: rgba(8,19,28,0.97); backdrop-filter: blur(20px); z-index: 190; flex-direction: column; padding: 24px 20px; gap: 4px; overflow-y: auto; }
.mobile-menu.open { display: flex; }
.mobile-menu .nav-link { font-size: 18px; padding: 14px 12px; border-radius: 8px; border-bottom: 1px solid var(--border); }
.mobile-menu .nav-link:last-child { border-bottom: none; }

/* ── FOOTER ── */
.footer { background: var(--bg-card); border-top: 1px solid var(--border); padding: 56px 0 0; margin-top: 80px; }
.footer-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px 48px; display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr; gap: 48px; }

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */

/* ── ADMIN ── */
.admin-wrap { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 60px); }

/* ── PROFILE PAGE ── */
.profile-wrap { max-width: 1000px; margin: 0 auto; padding: 48px 32px 80px; }
.profile-header { display: flex; align-items: flex-start; gap: 28px; margin-bottom: 48px; padding-bottom: 40px; border-bottom: 1px solid var(--border); }
.profile-avatar-xl { width: 88px; height: 88px; border-radius: 50%; background: #1a4060; display: flex; align-items: center; justify-content: center; font-family: var(--font-serif); font-size: 36px; color: var(--cyan); flex-shrink: 0; overflow: hidden; }
.profile-avatar-xl img { width: 100%; height: 100%; object-fit: cover; }
.profile-name { font-family: var(--font-serif); font-size: 32px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.profile-username { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
.profile-bio { font-size: 15px; color: var(--text-secondary); line-height: 1.6; max-width: 480px; }
.profile-stats { display: flex; gap: 28px; margin-top: 16px; }
.profile-stat-val { font-family: var(--font-serif); font-size: 22px; font-weight: 700; color: var(--text-primary); }
.profile-stat-lbl { font-size: 11px; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; }

/* ── NOTIFICATIONS ── */
.notif-wrap { max-width: 720px; margin: 0 auto; padding: 48px 32px 80px; }
.notif-item { display: flex; align-items: flex-start; gap: 14px; padding: 18px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .15s; }
.notif-item:last-child { border-bottom: none; }
.notif-item:hover { opacity: .8; }
.notif-item.unread { background: rgba(34,211,238,.03); margin: 0 -16px; padding: 18px 16px; border-radius: 8px; }
.notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); flex-shrink: 0; margin-top: 6px; }
.notif-dot.read { background: transparent; border: 1px solid var(--border-card); }
.notif-avatar { width: 38px; height: 38px; border-radius: 50%; background: #374151; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--text-primary); }
.notif-avatar img { width: 100%; height: 100%; object-fit: cover; }
.notif-text { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
.notif-text strong { color: var(--text-primary); font-weight: 600; }
.notif-time { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* ── HISTORY ── */
.history-wrap { max-width: 800px; margin: 0 auto; padding: 48px 32px 80px; }
.history-item { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .15s; }
.history-item:last-child { border-bottom: none; }
.history-item:hover { opacity: .75; }
.history-thumb { width: 72px; height: 52px; border-radius: 8px; overflow: hidden; background: var(--bg-card); flex-shrink: 0; }
.history-thumb img { width: 100%; height: 100%; object-fit: cover; }
.history-title { font-family: var(--font-serif); font-size: 16px; font-weight: 600; color: var(--text-primary); line-height: 1.3; margin-bottom: 4px; }
.history-meta { font-size: 12px; color: var(--text-muted); }
.history-clear { background: none; border: 1px solid var(--border-card); border-radius: 8px; padding: 8px 16px; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: all .15s; }
.history-clear:hover { color: #f87171; border-color: rgba(248,113,113,.3); }

/* ── DRAFTS / EDITOR ── */
.drafts-wrap { max-width: 900px; margin: 0 auto; padding: 48px 32px 80px; }
.draft-card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 12px; padding: 20px 22px; margin-bottom: 14px; display: flex; align-items: center; gap: 16px; }
.draft-card:hover { background: var(--bg-card-hover); }
.draft-info { flex: 1; min-width: 0; }
.draft-title { font-family: var(--font-serif); font-size: 17px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.draft-meta { font-size: 12px; color: var(--text-muted); }
.draft-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* ── DRAFT EDITOR ── */
.draft-editor-wrap { max-width: 860px; margin: 0 auto; padding: 40px 32px 80px; }
.draft-editor-topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
.de-input { background: transparent; border: none; outline: none; color: var(--text-primary); font-family: var(--font-sans); font-size: 14px; }
.de-title { font-family: var(--font-serif); font-size: clamp(28px,4vw,44px); font-weight: 700; color: var(--text-primary); border: none; outline: none; background: transparent; width: 100%; margin-bottom: 20px; line-height: 1.1; }
.de-title::placeholder { color: var(--text-muted); }
.de-body { width: 100%; min-height: 480px; background: transparent; border: none; outline: none; font-family: var(--font-sans); font-size: 17px; line-height: 1.8; color: var(--text-secondary); resize: none; }
.de-body::placeholder { color: var(--text-muted); }
.de-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.de-status { font-size: 12px; color: var(--text-muted); }
.de-status.saved { color: var(--cyan); }

@media (max-width: 600px) {
  .profile-header { flex-direction: column; gap: 16px; }
  .profile-avatar-xl { width: 64px; height: 64px; font-size: 26px; }
  .profile-wrap, .notif-wrap, .history-wrap, .drafts-wrap, .draft-editor-wrap { padding: 32px 16px 60px; }
  .draft-card { flex-direction: column; align-items: flex-start; }
  .draft-editor-topbar { gap: 8px; }
}

/* ── RESET PASSWORD ── */
.reset-wrap { min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.reset-card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
.reset-icon { width: 52px; height: 52px; border-radius: 50%; background: rgba(34,211,238,.1); border: 1px solid rgba(34,211,238,.2); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
.reset-title { font-family: var(--font-serif); font-size: 24px; font-weight: 600; margin-bottom: 6px; }
.reset-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.5; }
.reset-strength { height: 3px; border-radius: 2px; margin-top: 6px; transition: all .3s; }
.reset-strength-text { font-size: 11px; margin-top: 4px; }

/* ── EMAIL NOTIFICATION SYSTEM ── */
.email-preview { background: #ffffff; border-radius: 12px; overflow: hidden; max-width: 600px; margin: 0 auto; font-family: Georgia, serif; color: #1a1a1a; }
.email-header { background: #08131c; padding: 28px 32px; display: flex; align-items: center; gap: 12px; }
.email-logo { width: 36px; height: 36px; border-radius: 50%; background: #22d3ee; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #08131c; flex-shrink: 0; }
.email-brand { color: #f1f5f9; font-size: 18px; font-weight: 500; }
.email-body { padding: 36px 32px; }
.email-footer { background: #f8f8f8; padding: 20px 32px; font-size: 12px; color: #888; border-top: 1px solid #eee; }
</style>

const MOCK = {
  posts: [
    { id:'art-1', type:'article', slug:'art-1', title:'The Syllabus as Manifesto', category:'Education', cover_image:'https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200&q=80', excerpt:'Every course outline is a claim about what matters. Most students never notice they are reading a political document.', body:`<p>Every course outline is a claim about what matters. When a professor sits down to write a syllabus, they are not merely listing readings and deadlines — they are making an argument about the world.</p><p>Most students never notice they are reading a political document.</p><h2>The hidden curriculum</h2><p>The hidden curriculum of any institution is the set of norms, values, and expectations that are transmitted implicitly, without ever being named directly. The syllabus is the hidden curriculum made visible — if you know how to read it.</p><blockquote><p>What we assign is what we believe deserves to exist in a student's mind. Every exclusion is also a statement.</p></blockquote><p>Think about what it means to include a text from 1850 and nothing from 2010. Or to assign twelve male authors and two female ones. These choices are not neutral. They reflect what the professor — shaped by their own education, their discipline, their era — believes counts as knowledge.</p><h2>Reading against the grain</h2><p>The most useful skill any student can develop is the ability to read a syllabus against the grain. Ask not just what is being taught, but what is being left out. Ask why this particular sequence, this particular framing, this particular set of questions.</p><p>A syllabus that never names power is itself an exercise of power. Silence is a curriculum too.</p><p>This doesn't mean the professor is malicious or even conscious of these choices. Most of us inherit our syllabi from our teachers, who inherited them from theirs. The discipline reproduces itself. That's precisely why it matters to interrupt the reproduction.</p><h2>The student's right to read back</h2><p>Students have always had the right to read their education back to their educators. The best seminars in any university are the ones where students bring texts the professor didn't assign, ask questions the syllabus didn't anticipate, and refuse to be content with what is handed to them.</p><p>That capacity for refusal — not hostility, but genuine intellectual independence — is the thing a good education is actually trying to produce.</p><p>The irony is that the syllabus, when used well, is a map for getting beyond the syllabus.</p>`, author_id:'user-1', read_time:8, published_at:'2026-06-13T10:00:00Z', clap_count:142, comment_count:18, view_count:3400 },
    { id:'art-2', type:'article', slug:'art-2', title:"A Room of One's Own", category:'Culture', cover_image:'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1200&q=80', excerpt:"The architecture of privacy and the quiet argument for why a locked door is a form of self-respect.", body:`<p>There is a particular kind of loneliness that belongs only to people who have never had a room of their own. Not the loneliness of isolation, but the loneliness of never being alone — of existing always in the presence of others, never quite able to complete a thought before it is interrupted.</p><p>Virginia Woolf understood this when she wrote that a woman must have money and a room of her own if she is to write fiction. But the argument is larger than fiction. It is an argument about what the self requires in order to become itself.</p><h2>Privacy as a precondition</h2><p>We have come to think of privacy primarily as a legal or technological concept — something that corporations violate when they harvest your data, something governments threaten when they surveil your communications. But privacy, at its most basic, is spatial. It is the experience of being somewhere that is yours.</p><blockquote><p>A locked door is not a refusal of the world. It is a precondition for having something to offer the world when you return.</p></blockquote><p>Children who grow up sharing rooms, sleeping in shifts, doing homework at kitchen tables with siblings around them — they are not incapable of inner life. But their inner life is harder won. It requires a discipline of attention that children with their own rooms never have to develop.</p><h2>The politics of space</h2><p>To say that space is political is not a metaphor. It is a description. Who gets a room, how large that room is, whether it has a door that locks — these are not trivial matters of comfort. They are conditions of possibility for thought, for art, for the development of a self that is genuinely one's own.</p>`, author_id:'user-2', read_time:6, published_at:'2026-06-11T14:00:00Z', clap_count:89, comment_count:7, view_count:2100 },
    { id:'vid-1', type:'video', slug:'vid-1', title:'How a Newsroom Decides Whats True', category:'Documentary', cover_image:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200&q=80', excerpt:'Inside the editorial process that separates fact from noise.', body:`<p>In an age of infinite information and infinite misinformation, the newsroom stands as one of the last institutions that asks, systematically, the question: is this true?</p><p>This documentary follows the editorial meetings of three different publications — a legacy broadsheet, an independent digital outlet, and a student newspaper — over the course of a single week. What emerges is less a story about technology than a story about judgment.</p><h2>The process</h2><p>Every piece of information that enters a newsroom is treated, by default, as unconfirmed. The reporter's job is not to find sources who confirm what they already believe — it is to find sources who know something the reporter doesn't, and then to stress-test what those sources say.</p><p>This sounds obvious. It is surprisingly rare.</p>`, video_url:'https://www.youtube.com/embed/dQw4w9WgXcQ', duration:'12:04', author_id:'user-1', read_time:12, published_at:'2026-06-10T09:00:00Z', clap_count:340, comment_count:42, view_count:84000 },
    { id:'vid-2', type:'video', slug:'vid-2', title:'The Architecture of Attention', category:'Essay', cover_image:'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=1200&q=80', excerpt:'How the designed environment shapes what we notice and what we miss.', body:`<p>Attention is not a natural resource. It is a designed one. The spaces we inhabit, the interfaces we use, the cities we move through — all of them are built by people who understood, consciously or not, that to design a space is to design what people see within it.</p><p>This essay in film form explores three environments where this is most visible: the modern smartphone interface, the open-plan office, and the news feed.</p>`, video_url:'https://www.youtube.com/embed/dQw4w9WgXcQ', duration:'08:21', author_id:'user-2', read_time:8, published_at:'2026-06-08T11:00:00Z', clap_count:201, comment_count:29, view_count:32000 },
    { id:'vid-3', type:'video', slug:'vid-3', title:'A Year in the Library', category:'Visual', cover_image:'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1200&q=80', excerpt:'A quiet documentary about what happens in a public library over four seasons.', body:`<p>This film contains very little narration. Instead, it follows the library as a space — its morning unlocking, its afternoon bustle, its late-day quiet — across twelve months of a single year.</p><p>Libraries are among the last genuinely public spaces. You do not need to buy anything to enter. You do not need to produce anything while you are there. You are simply allowed to be.</p>`, video_url:'https://www.youtube.com/embed/dQw4w9WgXcQ', duration:'06:45', author_id:'user-3', read_time:6, published_at:'2026-06-05T16:00:00Z', clap_count:156, comment_count:14, view_count:21000 },
    { id:'sto-1', type:'story', slug:'sto-1', title:'The Cartographer of Unnamed Streets', category:'Fiction', cover_image:'https://images.unsplash.com/photo-1519682337058-a94d519337bc?w=1200&q=80', excerpt:'A woman who maps the streets that official cartographers forgot.', body:`<p>She worked in the gaps. Not the gaps between buildings, though those too had their own geography — but the gaps between what the city admitted to itself and what it actually was.</p><p>The official maps showed roads. She mapped the paths between roads: the cut-throughs behind the shopping center that everyone used but no one named, the alley that connected the old market to the bus stop, the shortcut through the park that had been walked into existence by twenty years of students taking the same diagonal.</p><h2>The unmapped world</h2><p>Most cities are two cities. There is the city of the planners, of the grid and the zoning map and the official address. And there is the city of the inhabitants, who have learned, over generations, that the shortest route between two points is never the one the planners intended.</p><p>Her job, as she understood it, was to translate between these two cities. To make visible what everyone knew but no one had written down.</p><blockquote><p>The most important roads in any city are the ones that don't exist.</p></blockquote><p>She had come to this work sideways, as most people come to their true work. She had trained as an urban planner, had worked for the city for six years, had grown increasingly frustrated by the gap between the maps she was asked to produce and the city she could see from her window. One morning she had simply stopped making the official maps and started making the other ones.</p>`, author_id:'user-3', read_time:14, published_at:'2026-06-09T10:00:00Z', clap_count:203, comment_count:31, view_count:4500 },
    { id:'sto-2', type:'story', slug:'sto-2', title:"What My Father Didn't Say at the Table", category:'Memoir', cover_image:'https://images.unsplash.com/photo-1455390582262-044cdead277a?w=1200&q=80', excerpt:'A memoir about the language of silence between fathers and sons.', body:`<p>My father was not a quiet man. He was loud at football, loud at the television news, loud when he disagreed with something and sometimes when he didn't. But at the dinner table, which was where I needed him most, he went somewhere else.</p><p>He wasn't absent. He was there, eating, passing the salt, occasionally commenting on the food. But the things I wanted to talk about — school, friendships, the creeping anxiety that had started following me like a second shadow — these were not dinner table topics. I learned this without being told.</p><h2>The inheritance of silence</h2><p>My grandfather had been the same way, I was told later. And his father before him. It is possible that this silence was passed down like a piece of furniture, each generation receiving it without being told what it was for, simply understanding that one did not discuss certain things at meals.</p><p>What I didn't understand until much later is that the silence was not absence. It was a form of protection. My father had grown up in a house where words had been weapons, where the table had been a battlefield. His silence was a gift he was giving us: the dinner table as a place of safety, even if that safety required a kind of blankness.</p>`, author_id:'user-2', read_time:11, published_at:'2026-06-07T13:00:00Z', clap_count:178, comment_count:26, view_count:3800 },
    { id:'tho-1', type:'thought', slug:'tho-1', title:'On Trust and Clickbait', category:'Reflection', cover_image:null, excerpt:'The opposite of clickbait isn\'t restraint. Its trust — earned slowly, one paragraph at a time.', body:'The opposite of clickbait isn\'t restraint. Its trust — earned slowly, one paragraph at a time.\n\nWe talk about the attention economy as if the solution is to demand less of it. But the real problem isn\'t length — it\'s the implicit promise every piece of writing makes to the reader. Clickbait breaks that promise in the first paragraph. Good writing keeps it for however long it needs to.\n\nI keep coming back to this: no one has ever complained that a piece was too good to stop reading. They complain when a piece makes them feel like their time was taken without being given anything in return.\n\nThe solution isn\'t shorter. It\'s truer.', author_id:'user-1', read_time:2, published_at:'2026-06-13T08:00:00Z', clap_count:67, comment_count:5, view_count:1200 },
    { id:'tho-2', type:'thought', slug:'tho-2', title:'Attention as Generosity', category:'Reflection', cover_image:null, excerpt:'I keep returning to the idea that attention is a form of generosity. We give it; we are not owed it.', body:'I keep returning to the idea that attention is a form of generosity. We give it; we are not owed it.\n\nEvery time someone reads something you wrote, they are giving you something irreplaceable. Not money, not clicks — time. Their actual time, which is the only resource none of us can get back.\n\nThe implications of this are uncomfortable for anyone who makes things online. It means the audience is not a market to be captured. It means engagement metrics are not the same as connection. It means that the thing you made might be perfectly good and still not deserve someone\'s attention on a particular Tuesday afternoon.\n\nAnd that\'s fine. That\'s how it should be.', author_id:'user-2', read_time:2, published_at:'2026-06-13T09:00:00Z', clap_count:91, comment_count:8, view_count:1500 },
    { id:'tho-3', type:'thought', slug:'tho-3', title:'Campus as Argument', category:'Reflection', cover_image:null, excerpt:'A campus is not a brand. It is a thousand small arguments held in the same hallway.', body:'A campus is not a brand. It is a thousand small arguments held in the same hallway.\n\nThe administrators want coherence. The marketers want a story. The trustees want stability. But the students and the faculty — when they\'re doing it right — want none of these things. They want the argument.\n\nThe best universities I have visited are the ones where you cannot walk twenty feet without someone disagreeing with someone else about something that matters. Where the seminar room spills out into the corridor. Where the question a professor asked in class is still being argued over dinner.\n\nThe brand is a lie. The argument is the thing.', author_id:'user-3', read_time:2, published_at:'2026-06-13T10:00:00Z', clap_count:54, comment_count:3, view_count:980 },
  ],

    'user-1': { id:'user-1', username:'amara_okafor', full_name:'Amara Okafor', avatar_url:'https://i.pravatar.cc/80?img=47', bio:'Staff writer. Covers education and culture.' },
    'user-2': { id:'user-2', username:'idris_mensah', full_name:'Idris Mensah', avatar_url:'https://i.pravatar.cc/80?img=12', bio:'Essayist. Former editor at The Campus Review.' },
    'user-3': { id:'user-3', username:'liana_voss', full_name:'Liana Voss', avatar_url:'https://i.pravatar.cc/80?img=29', bio:'Fiction writer and urban cartographer.' },

const isMock = () => SUPABASE_URL.includes('YOUR_PROJECT');

// ═══════════════════════════════════════════
// DATA LAYER
// All Supabase queries live here. Nothing
// else in the app calls sb.from() directly.
// ═══════════════════════════════════════════
const Data = {

  // ── getPost ── fetch a single post by id or slug
  async getPost(id) {
    if (isMock()) {
      const p = MOCK.posts.find(p => p.id === id || p.slug === id);
      if (!p) return null;
      return { ...p, author: MOCK.profiles[p.author_id] || null };
    }
    // Try by id first, then slug
    let { data, error } = await sb
      .from('posts')
      .select('*, author:profiles(*)')
      .eq('id', id)
      .eq('status', 'published')
      .maybeSingle();

    if (!data && !error) {
      // Try as slug
      ({ data, error } = await sb
        .from('posts')
        .select('*, author:profiles(*)')
        .eq('slug', id)
        .eq('status', 'published')
        .maybeSingle());
    }
    if (error) console.error('[Data.getPost]', error);
    return data || null;
  },

  // ── getPostsByType ── fetch list of posts filtered by type
  async getPostsByType(type, limit = 20, offset = 0) {
    if (isMock()) {
      return MOCK.posts
        .filter(p => p.type === type)
        .slice(offset, offset + limit)
        .map(p => ({ ...p, author: MOCK.profiles[p.author_id] || null }));
    }
    const { data, error } = await sb
      .from('posts')
      .select('id, slug, type, title, excerpt, category, cover_image, read_time, published_at, view_count, clap_count, author:profiles(id, full_name, username, avatar_url)')
      .eq('type', type)
      .eq('status', 'published')
      .order('published_at', { ascending: false })
      .range(offset, offset + limit - 1);

    if (error) console.error('[Data.getPostsByType]', error);
    return data || [];
  },

  // ── getMostRead ── top posts by view_count
  async getMostRead(limit = 5) {
    if (isMock()) {
      return [...MOCK.posts]
        .sort((a, b) => (b.view_count || 0) - (a.view_count || 0))
        .slice(0, limit);
    }
    const { data, error } = await sb
      .from('posts')
      .select('id, slug, type, title, category, read_time, view_count')
      .eq('status', 'published')
      .order('view_count', { ascending: false })
      .limit(limit);

    if (error) console.error('[Data.getMostRead]', error);
    return data || [];
  },

  // ── getRelated ── same type, different post, same category preferred
  async getRelated(post, limit = 3) {
    if (isMock()) {
      return MOCK.posts
        .filter(p => p.type === post.type && p.id !== post.id)
        .slice(0, limit)
        .map(p => ({ ...p, author: MOCK.profiles[p.author_id] || null }));
    }
    // Prefer same category first
    let { data } = await sb
      .from('posts')
      .select('id, slug, type, title, excerpt, category, cover_image, read_time, published_at, author:profiles(full_name, avatar_url)')
      .eq('type', post.type)
      .eq('status', 'published')
      .eq('category', post.category || '')
      .neq('id', post.id)
      .limit(limit);

    // Fallback: any post of same type
    if (!data || data.length < limit) {
      const { data: fallback } = await sb
        .from('posts')
        .select('id, slug, type, title, excerpt, category, cover_image, read_time, published_at, author:profiles(full_name, avatar_url)')
        .eq('type', post.type)
        .eq('status', 'published')
        .neq('id', post.id)
        .limit(limit);
      data = fallback || [];
    }
    return data;
  },

  // ── getComments ── fetch all top-level comments for a post
  async getComments(postId) {
    if (isMock()) {
      return (MOCK.comments[postId] || [])
        .map(c => ({ ...c, author: MOCK.profiles[c.author_id] || null }));
    }
    const { data, error } = await sb
      .from('comments')
      .select('*, author:profiles(id, username, full_name, avatar_url)')
      .eq('post_id', postId)
      .is('parent_id', null)
      .order('created_at', { ascending: true });

    if (error) console.error('[Data.getComments]', error);
    return data || [];
  },

  // ── postComment ── insert a new comment (requires auth)
  async postComment(postId, body) {
    if (!body?.trim()) throw new Error('Comment cannot be empty.');
    if (!Auth.isLoggedIn) throw new Error('You must be signed in to comment.');

    if (isMock()) {
      const user = Auth.currentUser;
      const c = {
        id: 'c' + Date.now(),
        post_id: postId,
        parent_id: null,
        body: body.trim(),
        created_at: new Date().toISOString(),
        author_id: user.id,
        author: {
          full_name: State.profile?.full_name || user.email.split('@')[0],
          avatar_url: State.profile?.avatar_url || null,
        },
      };
      MOCK.comments[postId] = MOCK.comments[postId] || [];
      MOCK.comments[postId].push(c);
      return c;
    }

    const { data, error } = await sb
      .from('comments')
      .insert({ post_id: postId, body: body.trim(), author_id: Auth.userId })
      .select('*, author:profiles(id, username, full_name, avatar_url)')
      .single();

    if (error) throw new Error(error.message);
    return data;
  },

  // ── getClaps ── how many times has this user clapped on this post?
  async getClaps(postId) {
    if (isMock()) return State.claps[postId] || 0;
    if (!Auth.isLoggedIn) return 0;

    // Check local cache first
    if (postId in State.claps) return State.claps[postId];

    const { data } = await sb
      .from('post_claps')
      .select('count')
      .eq('post_id', postId)
      .eq('user_id', Auth.userId)
      .maybeSingle();

    const count = data?.count || 0;
    State.claps[postId] = count;
    return count;
  },

  // ── addClap ── increment clap count (max 50 per user per post)
  async addClap(postId) {
    if (isMock()) {
      State.claps[postId] = Math.min((State.claps[postId] || 0) + 1, 50);
      return State.claps[postId];
    }
    if (!Auth.isLoggedIn) throw new Error('Sign in to clap.');

    const current = await this.getClaps(postId);
    if (current >= 50) return 50; // already maxed

    const newCount = current + 1;
    const { error } = await sb
      .from('post_claps')
      .upsert(
        { post_id: postId, user_id: Auth.userId, count: newCount },
        { onConflict: 'post_id,user_id' }
      );

    if (error) throw new Error(error.message);
    State.claps[postId] = newCount;
    return newCount;
  },

  // ── isBookmarked ── check bookmark state
  // State.bookmarks  = Set of bookmarked post IDs
  // State.bookmarkChecked = Set of IDs we've already queried (avoids repeat fetches)
  async isBookmarked(postId) {
    if (isMock()) return State.bookmarks.has(postId);
    if (!Auth.isLoggedIn) return false;

    // Return cached result if we've already fetched this post's bookmark state
    if (State.bookmarkChecked.has(postId)) return State.bookmarks.has(postId);

    const { data } = await sb
      .from('post_bookmarks')
      .select('post_id')
      .eq('post_id', postId)
      .eq('user_id', Auth.userId)
      .maybeSingle();

    State.bookmarkChecked.add(postId);
    if (data) State.bookmarks.add(postId);
    else State.bookmarks.delete(postId);
    return !!data;
  },

  // ── toggleBookmark ── add or remove bookmark
  async toggleBookmark(postId) {
    if (isMock()) {
      if (State.bookmarks.has(postId)) State.bookmarks.delete(postId);
      else State.bookmarks.add(postId);
      return State.bookmarks.has(postId);
    }
    if (!Auth.isLoggedIn) throw new Error('Sign in to bookmark.');

    const already = await this.isBookmarked(postId);
    if (already) {
      const { error } = await sb
        .from('post_bookmarks')
        .delete()
        .eq('post_id', postId)
        .eq('user_id', Auth.userId);
      if (error) throw new Error(error.message);
      State.bookmarks.delete(postId);
    } else {
      const { error } = await sb
        .from('post_bookmarks')
        .insert({ post_id: postId, user_id: Auth.userId });
      if (error) throw new Error(error.message);
      State.bookmarks.add(postId);
    }
    return !already;
  },

  // ── getBookmarks ── all bookmarked posts for the current user
  async getBookmarks() {
    if (isMock()) {
      return MOCK.posts
        .filter(p => State.bookmarks.has(p.id))
        .map(p => ({ ...p, author: MOCK.profiles[p.author_id] || null }));
    }
    if (!Auth.isLoggedIn) return [];

    const { data, error } = await sb
      .from('post_bookmarks')
      .select('post:posts(*, author:profiles(full_name, avatar_url))')
      .eq('user_id', Auth.userId)
      .order('created_at', { ascending: false });

    if (error) { console.error('[Data.getBookmarks]', error); return []; }
    // Hydrate bookmark cache
    (data || []).forEach(d => { if (d.post) State.bookmarks.add(d.post.id); });
    return (data || []).map(d => d.post).filter(Boolean);
  },

  // ── recordView ── track reading history (fire-and-forget)
  recordView(post) {
    // Always update local history
    const h = State.history;
    const idx = h.findIndex(x => x.id === post.id);
    if (idx >= 0) h.splice(idx, 1);
    h.unshift({
      id:        post.id,
      title:     post.title,
      type:      post.type,
      cover:     post.cover_image || null,
      viewed_at: new Date().toISOString(),
    });
    State.history = h.slice(0, 30);
    try { localStorage.setItem('mv_history', JSON.stringify(State.history)); } catch(e) {}

    // Also write to Supabase if logged in (non-blocking)
    if (!isMock() && Auth.isLoggedIn) {
      sb.from('post_views')
        .upsert(
          { post_id: post.id, user_id: Auth.userId, viewed_at: new Date().toISOString() },
          { onConflict: 'post_id,user_id' }
        )
        .then(() => {})
        .catch(() => {});
    }
  },

  // ── search ── full-text search across all published posts
  async search(query, limit = 20) {
    if (!query?.trim()) return [];

    if (isMock()) {
      const q = query.toLowerCase();
      return MOCK.posts
        .filter(p =>
          p.title.toLowerCase().includes(q) ||
          (p.excerpt || '').toLowerCase().includes(q) ||
          (p.body || '').toLowerCase().includes(q)
        )
        .slice(0, limit)
        .map(p => ({ ...p, author: MOCK.profiles[p.author_id] || null }));
    }

    // Use the search_posts() SQL function we created in the schema
    const { data, error } = await sb.rpc('search_posts', {
      query: query.trim(),
      result_limit: limit,
    });

    if (error) {
      // Fallback: ilike if RPC not available yet
      const { data: fallback } = await sb
        .from('posts')
        .select('id, slug, type, title, excerpt, category, cover_image, read_time, published_at, author:profiles(full_name, avatar_url)')
        .eq('status', 'published')
        .or(`title.ilike.%${query}%,excerpt.ilike.%${query}%`)
        .limit(limit);
      return fallback || [];
    }
    return data || [];
  },

  // ── getHomeFeed ── parallel fetch everything the home page needs
  async getHomeFeed() {
    const [articles, videos, stories, thoughts, mostRead] = await Promise.all([
      this.getPostsByType('article', 4),
      this.getPostsByType('video', 3),
      this.getPostsByType('story', 3),
      this.getPostsByType('thought', 3),
      this.getMostRead(5),
    ]);
    return { articles, videos, stories, thoughts, mostRead };
  },

  // ── PROFILE DATA ──
  async getProfile(username) {
    if (isMock()) {
      const p = Object.values(MOCK.profiles).find(p => p.username === username || p.id === username);
      if (!p) return null;
      const posts = MOCK.posts.filter(x => x.author_id === p.id && (x.status === 'published' || !x.status));
      return { profile: p, posts };
    }
    const { data: profile } = await sb.from('profiles').select('*').eq('username', username).maybeSingle();
    if (!profile) return null;
    const { data: posts } = await sb.from('posts')
      .select('id,slug,type,title,excerpt,cover_image,category,read_time,published_at,view_count,clap_count')
      .eq('author_id', profile.id).eq('status','published')
      .order('published_at', { ascending: false });
    return { profile, posts: posts || [] };
  },

  async getNotifications() {
    if (isMock()) return [
      { id:'n1', type:'comment', read:false, created_at:'2026-06-13T12:00:00Z', actor: MOCK.profiles['user-2'], post: MOCK.posts[0] },
      { id:'n2', type:'clap',    read:false, created_at:'2026-06-13T11:00:00Z', actor: MOCK.profiles['user-3'], post: MOCK.posts[0] },
      { id:'n3', type:'comment', read:true,  created_at:'2026-06-12T09:00:00Z', actor: MOCK.profiles['user-1'], post: MOCK.posts[2] },
    ];
    if (!Auth.isLoggedIn) return [];
    const { data } = await sb.from('notifications')
      .select('*, actor:profiles!actor_id(full_name,username,avatar_url), post:posts(id,type,title,slug)')
      .eq('user_id', Auth.userId)
      .order('created_at', { ascending: false })
      .limit(50);
    return data || [];
  },

  async markNotificationsRead() {
    if (isMock()) return;
    if (!Auth.isLoggedIn) return;
    await sb.from('notifications').update({ read: true }).eq('user_id', Auth.userId).eq('read', false);
  },

  async getHistory() {
    // Always return from localStorage (synced on read)
    return State.history || [];
  },

  async getDrafts() {
    if (isMock()) return MOCK.posts
      .filter(p => p.status === 'draft' && p.author_id === 'user-1')
      .map(p => ({ ...p, author: MOCK.profiles[p.author_id] }));
    if (!Auth.isLoggedIn) return [];
    const { data } = await sb.from('posts')
      .select('id,slug,type,title,excerpt,category,cover_image,updated_at,status')
      .eq('author_id', Auth.userId).eq('status','draft')
      .order('updated_at', { ascending: false });
    return data || [];
  },

  async saveDraft(draftData) {
    if (isMock()) {
      if (draftData.id) {
        const idx = MOCK.posts.findIndex(p => p.id === draftData.id);
        if (idx >= 0) { MOCK.posts[idx] = { ...MOCK.posts[idx], ...draftData }; return MOCK.posts[idx]; }
      }
      const np = { ...draftData, id:'draft-'+Date.now(), status:'draft', author_id:'user-1', created_at:new Date().toISOString(), updated_at:new Date().toISOString() };
      MOCK.posts.unshift(np); return np;
    }
    if (!Auth.isLoggedIn) throw new Error('Sign in to save drafts.');
    if (draftData.id) {
      const { id, ...fields } = draftData;
      const { data, error } = await sb.from('posts').update({ ...fields, updated_at: new Date().toISOString() }).eq('id', id).eq('author_id', Auth.userId).select().single();
      if (error) throw new Error(error.message);
      return data;
    } else {
      const slug = (draftData.title || 'draft').toLowerCase().replace(/[^a-z0-9]+/g,'-') + '-' + Date.now();
      const { data, error } = await sb.from('posts').insert({ ...draftData, slug, status:'draft', author_id: Auth.userId }).select().single();
      if (error) throw new Error(error.message);
      return data;
    }
  },

  async publishDraft(draftId) {
    if (isMock()) {
      const p = MOCK.posts.find(p => p.id === draftId);
      if (p) { p.status = 'published'; p.published_at = new Date().toISOString(); } return;
    }
    const { error } = await sb.from('posts').update({ status:'published', published_at: new Date().toISOString() }).eq('id', draftId).eq('author_id', Auth.userId);
    if (error) throw new Error(error.message);
  },

  async deleteDraft(draftId) {
    if (isMock()) { const idx = MOCK.posts.findIndex(p => p.id === draftId); if (idx>=0) MOCK.posts.splice(idx,1); return; }
    await sb.from('posts').delete().eq('id', draftId).eq('author_id', Auth.userId);
  },

  // ── ADMIN DATA METHODS ──

  async adminGetStats() {
    if (isMock()) {
      return {
        totalPosts: MOCK.posts.filter(p => p.status === 'published' || !p.status).length,
        totalUsers: 3,
        totalComments: Object.values(MOCK.comments).flat().length,
        totalViews: MOCK.posts.reduce((s, p) => s + (p.view_count || 0), 0),
        totalClaps: MOCK.posts.reduce((s, p) => s + (p.clap_count || 0), 0),
        draftCount: 0,
      };
    }
    const [posts, users, comments, views, claps, drafts] = await Promise.all([
      sb.from('posts').select('id', { count: 'exact', head: true }).eq('status', 'published'),
      sb.from('profiles').select('id', { count: 'exact', head: true }),
      sb.from('comments').select('id', { count: 'exact', head: true }),
      sb.from('posts').select('view_count').eq('status', 'published'),
      sb.from('posts').select('clap_count').eq('status', 'published'),
      sb.from('posts').select('id', { count: 'exact', head: true }).eq('status', 'draft'),
    ]);
    return {
      totalPosts:    posts.count || 0,
      totalUsers:    users.count || 0,
      totalComments: comments.count || 0,
      totalViews:    (views.data || []).reduce((s, p) => s + (p.view_count || 0), 0),
      totalClaps:    (claps.data || []).reduce((s, p) => s + (p.clap_count || 0), 0),
      draftCount:    drafts.count || 0,
    };
  },

  async adminGetAllPosts(limit = 100) {
    if (isMock()) {
      return MOCK.posts.map(p => ({ ...p, author: MOCK.profiles[p.author_id] || null }));
    }
    const { data, error } = await sb.from('posts')
      .select('id, slug, type, title, status, category, published_at, view_count, clap_count, comment_count, author:profiles(full_name)')
      .order('created_at', { ascending: false })
      .limit(limit);
    if (error) { console.error('[adminGetAllPosts]', error); return []; }
    return data || [];
  },

  async adminGetAllUsers(limit = 100) {
    if (isMock()) {
      return Object.values(MOCK.profiles).map(p => ({ ...p, role: 'reader', created_at: '2026-06-13T00:00:00Z' }));
    }
    const { data, error } = await sb.from('profiles')
      .select('id, username, full_name, email, role, avatar_url, created_at')
      .order('created_at', { ascending: false })
      .limit(limit);
    if (error) { console.error('[adminGetAllUsers]', error); return []; }
    return data || [];
  },

  async adminToggleStatus(postId, currentStatus) {
    const newStatus = currentStatus === 'published' ? 'draft' : 'published';
    const update = { status: newStatus };
    if (newStatus === 'published') update.published_at = new Date().toISOString();

    if (isMock()) {
      const p = MOCK.posts.find(p => p.id === postId);
      if (p) p.status = newStatus;
      return newStatus;
    }
    const { error } = await sb.from('posts').update(update).eq('id', postId);
    if (error) throw new Error(error.message);
    return newStatus;
  },

  async adminDeletePost(postId) {
    if (isMock()) {
      const idx = MOCK.posts.findIndex(p => p.id === postId);
      if (idx >= 0) MOCK.posts.splice(idx, 1);
      return;
    }
    const { error } = await sb.from('posts').delete().eq('id', postId);
    if (error) throw new Error(error.message);
  },

  async adminSavePost(postData) {
    if (isMock()) {
      if (postData.id) {
        const idx = MOCK.posts.findIndex(p => p.id === postData.id);
        if (idx >= 0) MOCK.posts[idx] = { ...MOCK.posts[idx], ...postData };
        return MOCK.posts.find(p => p.id === postData.id);
      } else {
        const np = { ...postData, id: 'post-' + Date.now(), author_id: 'user-1', view_count: 0, clap_count: 0, comment_count: 0, created_at: new Date().toISOString() };
        MOCK.posts.unshift(np);
        return np;
      }
    }
    if (postData.id) {
      const { id, ...fields } = postData;
      const { data, error } = await sb.from('posts').update(fields).eq('id', id).select().single();
      if (error) throw new Error(error.message);
      return data;
    } else {
      const { data, error } = await sb.from('posts')
        .insert({ ...postData, author_id: Auth.userId })
        .select().single();
      if (error) throw new Error(error.message);
      return data;
    }
  },

  async adminSetUserRole(userId, role) {
    if (isMock()) {
      const p = MOCK.profiles[userId];
      if (p) p.role = role;
      return;
    }
    const { error } = await sb.from('profiles').update({ role }).eq('id', userId);
    if (error) throw new Error(error.message);
  },

  async adminGetTopPosts(limit = 10) {
    if (isMock()) {
      return [...MOCK.posts].sort((a,b) => (b.view_count||0)-(a.view_count||0)).slice(0,limit);
    }
    const { data } = await sb.from('posts')
      .select('id, title, type, view_count, clap_count, comment_count')
      .eq('status', 'published')
      .order('view_count', { ascending: false })
      .limit(limit);
    return data || [];
  },
};

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
const Auth = {
  currentUser: null,  // Supabase User object or null

  // ── init ── called once on page load
  async init() {
    if (isMock()) {
      this.currentUser = null;
      this._updateNavUI();
      return;
    }

    // Restore existing session (handles page refresh)
    const { data: { session } } = await sb.auth.getSession();
    this.currentUser = session?.user ?? null;
    if (this.currentUser) await this._loadProfile();

    // Listen for future auth changes (sign in, sign out, token refresh)
    sb.auth.onAuthStateChange(async (event, session) => {
      // Supabase fires PASSWORD_RECOVERY when user clicks the reset link
      if (event === 'PASSWORD_RECOVERY') {
        this.currentUser = session?.user ?? null;
        this._updateNavUI();
        Router.go('/reset-password');
        return;
      }
      this.currentUser = session?.user ?? null;
      State.profile = null;
      if (this.currentUser) await this._loadProfile();
      this._updateNavUI();
      // Re-render current page so auth-gated content updates
      Router.resolve();
    });

    this._updateNavUI();
  },

  // ── _loadProfile ── fetch profile row for current user
  async _loadProfile() {
    if (!this.currentUser) return;
    try {
      const { data } = await sb
        .from('profiles')
        .select('*')
        .eq('id', this.currentUser.id)
        .single();
      State.profile = data || null;
    } catch(e) { /* profile may not exist yet — that's fine */ }
  },

  // ── _updateNavUI ── sync avatar/initials in the nav
  _updateNavUI() {
    const av = document.getElementById('nav-avatar');
    if (!av) return;
    const notifBtn = document.getElementById('nav-notif-btn');
    if (notifBtn) notifBtn.style.display = this.currentUser ? 'flex' : 'none';
    if (this.currentUser) {
      const name = State.profile?.full_name || this.currentUser.email || '?';
      av.textContent = name[0].toUpperCase();
      av.title = (State.profile?.full_name || this.currentUser.email) + " · Settings";
      av.style.background = '#1a4060';
      av.style.color = 'var(--cyan)';
    } else {
      av.textContent = '?';
      av.title = 'Sign in';
      av.style.background = '#374151';
      av.style.color = 'var(--text-primary)';
    }
  },

  // ── showModal ── open sign-in or sign-up modal
  showModal(mode = 'signin') {
    document.getElementById('auth-modal').classList.remove('hidden');
    document.getElementById('modal-body').innerHTML = this._modalHTML(mode);
    // Focus email field after render
    setTimeout(() => document.getElementById('auth-email')?.focus(), 50);
  },

  closeModal() {
    document.getElementById('auth-modal').classList.add('hidden');
  },

  _modalHTML(mode) {
    const s = mode === 'signin';
    return `
      <h2 class="modal-title">${s ? 'Welcome back' : 'Join Micova'}</h2>
      <p class="modal-subtitle">${s ? 'Sign in to clap, comment, and bookmark.' : 'Create an account to join the conversation.'}</p>
      <input class="modal-input" id="auth-email" type="email" placeholder="Email address" autocomplete="email">
      <input class="modal-input" id="auth-password" type="password" placeholder="Password"
        autocomplete="${s ? 'current-password' : 'new-password'}"
        onkeydown="if(event.key==='Enter')Auth.submit('${mode}')">
      <div class="modal-error" id="auth-error"></div>
      <button class="modal-btn" id="auth-submit" onclick="Auth.submit('${mode}')">
        ${s ? 'Sign in' : 'Create account'}
      </button>
      ${s ? `<div style="text-align:center;margin-top:10px">
        <button style="background:none;border:none;color:var(--text-muted);font-size:12px;cursor:pointer"
          onclick="Auth._forgotPassword()">Forgot password?</button>
      </div>` : ''}
      <div class="modal-toggle">${s ? "Don't have an account? " : 'Already have an account? '}
        <span onclick="Auth.showModal('${s ? 'signup' : 'signin'}')">${s ? 'Sign up' : 'Sign in'}</span>
      </div>`;
  },

  // ── submit ── handle sign-in or sign-up form
  async submit(mode) {
    const email    = document.getElementById('auth-email')?.value?.trim();
    const password = document.getElementById('auth-password')?.value;
    const errEl    = document.getElementById('auth-error');
    const btn      = document.getElementById('auth-submit');

    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
    if (password.length < 6)  { errEl.textContent = 'Password must be at least 6 characters.'; return; }

    btn.disabled = true;
    btn.textContent = 'Please wait…';

    try {
      // ── DEMO MODE (no Supabase config yet) ──
      if (isMock()) {
        this.currentUser = { id: 'mock-user-' + Date.now(), email };
        State.profile = { id: this.currentUser.id, full_name: email.split('@')[0], email };
        this.closeModal();
        this._updateNavUI();
        UI.toast(mode === 'signin' ? 'Signed in (demo mode)' : 'Account created (demo mode)', 'success');
        return;
      }

      // ── REAL SUPABASE AUTH ──
      if (mode === 'signin') {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        this.closeModal();
        UI.toast('Welcome back!', 'success');

      } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) throw error;

        // Create a profile row immediately on sign-up
        if (data.user) {
          await sb.from('profiles').upsert({
            id:         data.user.id,
            email:      email,
            username:   email.split('@')[0].toLowerCase().replace(/[^a-z0-9_]/g, '_'),
            full_name:  email.split('@')[0],
            created_at: new Date().toISOString(),
          }, { onConflict: 'id' });
        }

        this.closeModal();
        // Supabase may require email confirmation depending on your settings
        const needsConfirm = !data.session;
        UI.toast(
          needsConfirm
            ? 'Check your email to confirm your account!'
            : 'Account created! Welcome to Micova.',
          'success'
        );
      }

    } catch(e) {
      // Map common Supabase error messages to friendlier text
      const msg = e.message || '';
      errEl.textContent =
        msg.includes('Invalid login') ? 'Incorrect email or password.' :
        msg.includes('already registered') ? 'An account with this email already exists.' :
        msg.includes('Email not confirmed') ? 'Please confirm your email before signing in.' :
        msg.includes('rate limit') ? 'Too many attempts. Please wait a moment.' :
        msg || 'Something went wrong. Please try again.';

      btn.disabled = false;
      btn.textContent = mode === 'signin' ? 'Sign in' : 'Create account';
    }
  },

  // ── _forgotPassword ── send password reset email
  async _forgotPassword() {
    const email = document.getElementById('auth-email')?.value?.trim();
    if (!email) {
      document.getElementById('auth-error').textContent = 'Enter your email above first.';
      return;
    }
    if (isMock()) { UI.toast('Password reset sent (demo mode)', 'success'); return; }
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname + '#!/reset-password',
    });
    if (error) { document.getElementById('auth-error').textContent = error.message; return; }
    this.closeModal();
    UI.toast('Password reset email sent!', 'success');
  },

  // ── signOut ──
  async signOut() {
    if (!isMock()) {
      const { error } = await sb.auth.signOut();
      if (error) { UI.toast('Sign out failed: ' + error.message, 'error'); return; }
    }
    this.currentUser = null;
    State.profile    = null;
    State.claps      = {};
    State.bookmarks  = new Set();
    State.bookmarkChecked = new Set();
    this._updateNavUI();
    UI.toast('Signed out.', 'success');
    Router.go('/');
  },

  // ── require ── gate any action behind auth; shows modal if not signed in
  require() {
    if (!this.currentUser) {
      this.showModal('signin');
      return false;
    }
    return true;
  },

  get isLoggedIn() { return !!this.currentUser; },
  get userId()     { return this.currentUser?.id ?? null; },
};
