// ROUTER
// ═══════════════════════════════════════════
const Router = {
  get routes() {
    return {
      '/':            Pages.home,
      '/articles':    Pages.list,
      '/videos':      Pages.list,
      '/stories':     Pages.list,
      '/thoughts':    Pages.list,
      '/bookmarks':   Pages.bookmarks,
      '/search':      Pages.search,
      '/settings':    Pages.settings,
      '/article/:id': Pages.reader,
      '/video/:id':   Pages.reader,
      '/story/:id':   Pages.reader,
      '/thought/:id': Pages.reader,
      '/admin':           Pages.adminDashboard,
      '/admin/cms':       Pages.adminCMS,
      '/admin/users':     Pages.adminUsers,
      '/admin/analytics': Pages.adminAnalytics,
      '/profile/:username': Pages.profile,
      '/notifications':     Pages.notifications,
      '/history':           Pages.history,
      '/drafts':            Pages.drafts,
      '/draft/:id':         Pages.draftEditor,
      '/reset-password':    Pages.resetPassword,
    };
  },

  go(path) {
    window.location.hash = '!' + path;
    UI.closeMobileMenu && UI.closeMobileMenu();
  },

  parse() {
    const hash = window.location.hash.replace(/^#!/, '') || '/';
    for (const [pattern, handler] of Object.entries(this.routes)) {
      const params = this.match(pattern, hash);
      if (params !== null) return { path: hash, pattern, handler, params };
    }
    return { path: hash, pattern: null, handler: Pages.notFound.bind(Pages), params: {} };
  },

  match(pattern, path) {
    const pp = pattern.split('/');
    const hp = path.split('?')[0].split('/');
    if (pp.length !== hp.length) return null;
    const params = {};
    for (let i = 0; i < pp.length; i++) {
      if (pp[i].startsWith(':')) params[pp[i].slice(1)] = decodeURIComponent(hp[i]);
      else if (pp[i] !== hp[i]) return null;
    }
    return params;
  },

  init() {
    window.addEventListener('hashchange', () => this.resolve());
    this.resolve();
  },

  resolve() {
    const { path, handler, params } = this.parse();
    // Update nav active
    document.querySelectorAll('.nav-link').forEach(el => {
      el.classList.toggle('active', el.dataset.route === path || (path === '/' && el.dataset.route === '/'));
    });
    // Hide progress bar unless on reader
    const isReader = /^\/(article|video|story|thought)\//.test(path);
    document.querySelector('.reading-progress').style.display = isReader ? 'block' : 'none';
    // Render
    const app = document.getElementById('app');
    handler(app, params, path);
    window.scrollTo(0, 0);
  }
};

    const bar = document.getElementById('reading-progress-bar');

    const update = () => {
      const doc = document.documentElement;
      const total = doc.scrollHeight - doc.clientHeight;
      const pct = total > 0 ? (window.scrollY / total) * 100 : 0;
      bar.style.width = Math.min(100, pct) + '%';
    };
    window.removeEventListener('scroll', window._progressHandler);
    window._progressHandler = update;
    window.addEventListener('scroll', update, { passive: true });

  // ── READER ──
  async reader(app, params) {
    const id = params.id;
    app.innerHTML = UI.loader();
    try {
      const [post, mostRead] = await Promise.all([
        Data.getPost(id),
        Data.getMostRead(5)
      ]);

      if (!post) { Pages.notFound(app); return; }

      const [comments, userClaps, isBookmarked, related] = await Promise.all([
        Data.getComments(post.id),
        Data.getClaps(post.id),
        Data.isBookmarked(post.id),
        Data.getRelated(post, 3)
      ]);

      Data.recordView(post);

      const author = post.author || {};
      const totalClaps = post.clap_count || 0;

      // Render based on type
      let mainContent = '';
      if (post.type === 'video') {
        mainContent = Pages._videoContent(post, author);
      } else if (post.type === 'thought') {
        mainContent = Pages._thoughtContent(post, author);
      } else {
        mainContent = Pages._articleContent(post, author);
      }

      app.innerHTML = `
      <div class="reader-wrap">
        <div class="reader-main">
          <button class="reader-back" onclick="history.back()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>

          ${mainContent}

              Clap <span id="clap-count-label">${userClaps > 0 ? userClaps : ''}</span>
            </button>
            <span class="clap-count" id="total-clap-count">${totalClaps} claps</span>
            <div style="margin-left:auto;display:flex;gap:10px;">
              <button class="reader-action-btn ${isBookmarked ? 'active' : ''}" id="bookmark-btn" onclick="Pages.handleBookmark('${post.id}')">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="${isBookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                ${isBookmarked ? 'Saved' : 'Save'}
              </button>
              <button class="reader-action-btn" onclick="Pages.handleShare('${post.title}')">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                Share
              </button>
            </div>
          </div>

          <!-- COMMENTS -->
          <div class="comments-section">
            <div class="comments-title">Comments <span style="font-size:18px;font-weight:400;color:var(--text-muted)">(${comments.length})</span></div>
            <div class="comment-input-wrap">
              <div class="comment-input-row">
                <div class="thought-avatar" style="width:36px;height:36px;flex-shrink:0;">${Auth.currentUser ? Auth.currentUser.email[0].toUpperCase() : '?'}</div>
                <textarea class="comment-textarea" id="comment-input" placeholder="${Auth.currentUser ? 'Share your thoughts…' : 'Sign in to leave a comment'}"></textarea>
              </div>
              <div class="comment-submit-row">
                ${!Auth.currentUser ? `<span class="comment-auth-note">You need to <span style="color:var(--cyan);cursor:pointer" onclick="Auth.showModal('signin')">sign in</span> to comment.</span>` : ''}
                <button class="btn-submit" id="comment-submit-btn" onclick="Pages.handleComment('${post.id}')" ${!Auth.currentUser ? 'disabled' : ''}>Post</button>
              </div>
            </div>
            <div class="comment-list" id="comment-list">
              ${comments.length === 0
                ? `<div class="comments-empty">No comments yet. Be the first.</div>`
                : comments.map(c => Pages._commentHTML(c)).join('')}
            </div>
          </div>

          <!-- RELATED -->
          ${related.length > 0 ? `
          <div class="related-section">
            <div class="related-title">More to read</div>
            <div class="related-grid">${related.map(p =>
              post.type === 'video' ? UI.videoCardHTML(p) :
              post.type === 'thought' ? UI.thoughtCardHTML(p) :
              post.type === 'story' ? UI.storyCardHTML(p) :

            ).join('')}</div>

        <!-- SIDEBAR -->
        <div class="reader-sidebar">
          ${State.history.length > 1 ? `
          <div class="sidebar-widget">

              <div class="sidebar-post-item" onclick="Router.go('/${h.type}/${h.id}')">
                <div><div class="sidebar-post-title">${h.title}</div><div class="sidebar-post-meta">${UI.formatDate(h.viewed_at)}</div></div>
              </div>`).join('')}

          </div>
        </div>
      </div>
      ${UI.footerHTML()}`;

      UI.initReadingProgress();
    } catch(e) {
      Pages.error(app, 'Could not load this page', e.message);

  _articleContent(post, author) {
    return `

      <h1 class="reader-title">${post.title}</h1>
      ${post.excerpt ? `<p class="reader-subtitle">${post.excerpt}</p>` : ''}
      <div class="reader-byline">
        <div class="reader-author-avatar">${author.avatar_url ? `<img src="${author.avatar_url}" alt="${author.full_name}">` : (author.full_name||'?')[0]}</div>
        <div>
          <div class="reader-author-name" style='cursor:pointer' onclick="Router.go('/profile/${author.username||author.id}')">${author.full_name || 'Anonymous'}</div>
          <div class="reader-meta-row">
            <span>${UI.formatDate(post.published_at)}</span>
            ${post.read_time ? `<span class="reader-meta-dot">·</span><span>${post.read_time} min read</span>` : ''}
            ${post.view_count ? `<span class="reader-meta-dot">·</span><span>${Number(post.view_count).toLocaleString()} views</span>` : ''}
          </div>
        </div>
      </div>
      <div class="reader-body">${post.body || '<p>Content coming soon.</p>'}</div>`;
  },

  _videoContent(post, author) {
    return `
      <div class="reader-category">${post.category || 'Video'}</div>
      <h1 class="reader-title">${post.title}</h1>
      ${post.excerpt ? `<p class="reader-subtitle">${post.excerpt}</p>` : ''}
      <div class="reader-byline">
        <div class="reader-author-avatar">${author.avatar_url ? `<img src="${author.avatar_url}" alt="${author.full_name}">` : (author.full_name||'?')[0]}</div>
        <div>
          <div class="reader-author-name">${author.full_name || 'Anonymous'}</div>
          <div class="reader-meta-row">
            <span>${UI.formatDate(post.published_at)}</span>
            ${post.duration ? `<span class="reader-meta-dot">·</span><span>${post.duration}</span>` : ''}
            ${post.view_count ? `<span class="reader-meta-dot">·</span><span>${Number(post.view_count).toLocaleString()} views</span>` : ''}

        </div>
      </div>
      <div class="video-embed-wrap">
        ${post.video_url
          ? `<iframe src="${post.video_url}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" title="${post.title}"></iframe>`
          : `<div class="video-embed-placeholder"><div class="play-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="var(--cyan)"><polygon points="5 3 19 12 5 21 5 3"/></svg></div><span>Video unavailable</span></div>`}
      </div>
      <div class="reader-body">${post.body || ''}</div>`;
  },

  _thoughtContent(post, author) {
    const lines = (post.body || post.excerpt || '').split('\n').filter(l => l.trim());
    return `
      <div class="reader-category">${post.category || 'Thought'}</div>
      <div class="reader-byline">
        <div class="reader-author-avatar">${author.avatar_url ? `<img src="${author.avatar_url}" alt="${author.full_name}">` : (author.full_name||'?')[0]}</div>
        <div>
          <div class="reader-author-name">${author.full_name || 'Anonymous'}</div>
          <div class="reader-meta-row"><span>${UI.formatDate(post.published_at)}</span></div>
        </div>
      </div>
      <div class="thought-reader-quote">${lines[0] || ''}</div>
      ${lines.slice(1).map(l => `<div class="reader-body" style="margin-bottom:20px"><p>${l}</p></div>`).join('')}`;
  },

  _commentHTML(c) {
    const author = c.author || {};
    const initial = (author.full_name || author.username || '?')[0].toUpperCase();
    return `
      <div class="comment-item">
        <div class="comment-header">
          <div class="comment-avatar">${author.avatar_url ? `<img src="${author.avatar_url}" alt="${author.full_name}" loading="lazy">` : initial}</div>
          <span class="comment-author">${author.full_name || author.username || 'Anonymous'}</span>
          <span class="comment-date">${UI.formatDate(c.created_at)}</span>
        </div>
        <div class="comment-body">${c.body}</div>
      </div>`;
  },

  async handleClap(postId) {
    if (!Auth.require()) return;
    try {
      const newCount = await Data.addClap(postId);
      const btn = document.getElementById('clap-btn');
      const label = document.getElementById('clap-count-label');
      if (btn) { btn.classList.add('clapped'); btn.querySelector('svg').setAttribute('fill','currentColor'); }
      if (label) label.textContent = newCount;
      const total = document.getElementById('total-clap-count');
      if (total) {
        const cur = parseInt(total.textContent) || 0;
        total.textContent = (cur + 1) + ' claps';
      }
    } catch(e) { UI.toast(e.message, 'error'); }
  },

  async handleBookmark(postId) {
    if (!Auth.require()) return;
    try {
      const nowBookmarked = await Data.toggleBookmark(postId);
      const btn = document.getElementById('bookmark-btn');
      if (btn) {
        btn.classList.toggle('active', nowBookmarked);
        btn.querySelector('svg').setAttribute('fill', nowBookmarked ? 'currentColor' : 'none');
        btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="${nowBookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>${nowBookmarked ? 'Saved' : 'Save'}`;
      }
      UI.toast(nowBookmarked ? 'Bookmarked!' : 'Bookmark removed.', 'success');
    } catch(e) { UI.toast(e.message, 'error'); }
  },

  async handleComment(postId) {
    const input = document.getElementById('comment-input');
    const body = input?.value?.trim();
    if (!body) return;
    const btn = document.getElementById('comment-submit-btn');
    btn.disabled = true; btn.textContent = 'Posting…';
    try {
      const comment = await Data.postComment(postId, body);
      input.value = '';
      const list = document.getElementById('comment-list');
      const emptyMsg = list.querySelector('.comments-empty');
      if (emptyMsg) emptyMsg.remove();
      list.insertAdjacentHTML('afterbegin', Pages._commentHTML(comment));
      UI.toast('Comment posted!', 'success');
    } catch(e) {
      UI.toast(e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Post';
    }
  },

  handleShare(title) {
    const url = window.location.href;
    if (navigator.share) {
      navigator.share({ title, url }).catch(() => {});
    } else {
      navigator.clipboard.writeText(url).then(() => UI.toast('Link copied!', 'success')).catch(() => UI.toast('Copy: ' + url, 'success'));
    }
  },

        clap:    (n) => `<strong>${n.actor?.full_name||'Someone'}</strong> clapped for <strong>${n.post?.title||'your post'}</strong>`,
        follow:  (n) => `<strong>${n.actor?.full_name||'Someone'}</strong> started following you`,
        reply:   (n) => `<strong>${n.actor?.full_name||'Someone'}</strong> replied to your comment`,

              const actor = n.actor || {};
              const initial = (actor.full_name||'?')[0].toUpperCase();
              const route = n.post ? `/${n.post.type||'article'}/${n.post.id}` : '/';
              const msgFn = typeMsg[n.type] || (() => `New notification`);

        draft = drafts.find(d => d.id === id) || null;

    app.innerHTML = `

  // ── SEARCH ──
  async search(app, params, path) {
    // Parse ?q= from the hash e.g. #!/search?q=education
    const qs = window.location.hash.split('?')[1] || '';
    const initialQuery = new URLSearchParams(qs).get('q') || '';

    const render = async (query) => {
      if (!query.trim()) {
        app.innerHTML = `
          <div class="container" style="padding-top:48px;padding-bottom:80px;">
            <div style="margin-bottom:32px">
              <div class="section-label">Find</div>
              <div class="section-title" style="margin-bottom:24px">Search</div>
              ${searchInputHTML(query)}
            </div>
            <div style="text-align:center;padding:80px 0;color:var(--text-muted);font-size:15px;">Type something to search all stories, articles, and videos.</div>
          </div>
          ${UI.footerHTML()}`;
        wireSearch();
        return;
      }

      app.innerHTML = `
        <div class="container" style="padding-top:48px;padding-bottom:80px;">
          <div style="margin-bottom:32px">
            <div class="section-label">Find</div>
            <div class="section-title" style="margin-bottom:24px">Search</div>
            ${searchInputHTML(query)}
          </div>
          ${UI.loader()}
        </div>`;
      wireSearch();

      try {
        const results = await Data.search(query);
        const resultsArea = app.querySelector('.page-loader').parentElement;
        if (results.length === 0) {
          resultsArea.querySelector('.page-loader').outerHTML = `
            <div style="text-align:center;padding:60px 0;color:var(--text-muted);font-size:15px;">
              No results for "<strong style="color:var(--text-secondary)">${query}</strong>". Try different keywords.
            </div>`;
          return;
        }
        // Group by type
        const byType = {};
        results.forEach(p => { (byType[p.type] = byType[p.type] || []).push(p); });
        const typeLabels = { article:'Articles', video:'Videos', story:'Stories', thought:'Thoughts' };
        let html = `<p style="font-size:13px;color:var(--text-muted);margin-bottom:28px">${results.length} result${results.length !== 1 ? 's' : ''} for "<strong style="color:var(--text-secondary)">${query}</strong>"</p>`;
        for (const [type, posts] of Object.entries(byType)) {
          html += `<div style="margin-bottom:40px">
            <div class="section-label" style="margin-bottom:16px">${typeLabels[type] || type}</div>
            <div class="${type === 'video' ? 'videos-grid' : type === 'thought' ? 'thoughts-grid' : 'articles-grid'}">
              ${posts.map(p =>
                type === 'video'   ? UI.videoCardHTML(p) :
                type === 'thought' ? UI.thoughtCardHTML(p) :
                type === 'story'   ? UI.storyCardHTML(p) :
                UI.cardHTML(p)
              ).join('')}
            </div>
          </div>`;
        }
        app.querySelector('.page-loader').outerHTML = html;
      } catch(e) {
        app.querySelector('.page-loader').outerHTML = `<div style="color:var(--text-muted);font-size:14px;padding:40px 0">Search failed: ${e.message}</div>`;
      }
    };

    function searchInputHTML(val) {
      return `<div style="display:flex;gap:10px;max-width:600px">
        <input id="search-input" type="search" value="${val.replace(/"/g,'&quot;')}" placeholder="Search stories, articles, videos…"
          style="flex:1;background:var(--bg-card);border:1px solid var(--border-card);border-radius:10px;padding:12px 16px;font-size:15px;color:var(--text-primary);font-family:var(--font-sans);outline:none"
          onfocus="this.style.borderColor='rgba(34,211,238,.4)'" onblur="this.style.borderColor=''">
        <button id="search-btn" onclick="Pages._runSearch()"
          style="background:var(--cyan);color:#08131c;border:none;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:600;cursor:pointer">Search</button>
      </div>`;
    }

    function wireSearch() {
      const inp = document.getElementById('search-input');
      if (inp) {
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') Pages._runSearch(); });
        setTimeout(() => inp.focus(), 50);
      }
    }

    Pages._runSearch = () => {
      const q = document.getElementById('search-input')?.value?.trim() || '';
      // Update hash without triggering full re-render
      history.replaceState(null, '', window.location.pathname + (window.location.search || '') + '#!/search' + (q ? '?q=' + encodeURIComponent(q) : ''));
      render(q);
    };

    render(initialQuery);
  },

  // ════════════════════════════════════════
  // RESET PASSWORD  #!/reset-password
  // ════════════════════════════════════════
  async resetPassword(app) {
    // This page is reached in two ways:
    // A) User clicked the email link (Supabase sets the session via PASSWORD_RECOVERY event)
    // B) User navigated directly (show a prompt to request reset instead)

    const hasSession = !!Auth.currentUser;

    const renderForm = () => {
      app.innerHTML = `
      <div class="reset-wrap">
        <div class="reset-card">
          <div class="reset-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <div class="reset-title">Set new password</div>
          <div class="reset-sub">Choose a strong password for your Micova account.</div>

          <div class="editor-field">
            <label class="editor-label">New password</label>
            <input class="editor-input" id="rp-pass" type="password" placeholder="At least 8 characters"
              oninput="Pages._checkPassStrength(this.value)" autocomplete="new-password">
            <div class="reset-strength" id="rp-strength-bar" style="background:var(--border-card);width:0%"></div>
            <div class="reset-strength-text" id="rp-strength-text"></div>
          </div>
          <div class="editor-field">
            <label class="editor-label">Confirm password</label>
            <input class="editor-input" id="rp-confirm" type="password" placeholder="Repeat password"
              autocomplete="new-password" onkeydown="if(event.key==='Enter')Pages._submitReset()">
          </div>
          <div class="editor-error" id="rp-error"></div>
          <button class="settings-btn" style="width:100%;margin-top:16px;justify-content:center" onclick="Pages._submitReset()">
            Update password
          </button>
        </div>
      </div>`;
      document.getElementById('rp-pass')?.focus();
    };

    const renderRequest = () => {
      app.innerHTML = `
      <div class="reset-wrap">
        <div class="reset-card">
          <div class="reset-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div class="reset-title">Reset your password</div>
          <div class="reset-sub">Enter your email and we'll send you a link to reset your password.</div>
          <div class="editor-field">
            <label class="editor-label">Email address</label>
            <input class="editor-input" id="rp-email" type="email" placeholder="you@example.com"
              autocomplete="email" onkeydown="if(event.key==='Enter')Pages._submitResetRequest()">
          </div>
          <div class="editor-error" id="rp-error"></div>
          <button class="settings-btn" style="width:100%;margin-top:16px;justify-content:center" onclick="Pages._submitResetRequest()">
            Send reset link
          </button>
          <div style="text-align:center;margin-top:16px">
            <span style="font-size:13px;color:var(--text-muted);cursor:pointer" onclick="Router.go('/')">← Back to home</span>
          </div>
        </div>
      </div>`;
      document.getElementById('rp-email')?.focus();
    };

    hasSession ? renderForm() : renderRequest();
  },

  _checkPassStrength(val) {
    const bar  = document.getElementById('rp-strength-bar');
    const text = document.getElementById('rp-strength-text');
    if (!bar || !text) return;
    let score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { pct:'20%', color:'#ef4444', label:'Too short' },
      { pct:'40%', color:'#f97316', label:'Weak' },
      { pct:'60%', color:'#eab308', label:'Fair' },
      { pct:'80%', color:'#22c55e', label:'Good' },
      { pct:'100%',color:'#22d3ee', label:'Strong' },
    ];
    const lvl = levels[Math.min(score, 4)];
    bar.style.width  = val ? lvl.pct : '0%';
    bar.style.background = val ? lvl.color : 'var(--border-card)';
    text.textContent = val ? lvl.label : '';
    text.style.color = lvl.color;
  },

  async _submitReset() {
    const pass    = document.getElementById('rp-pass')?.value;
    const confirm = document.getElementById('rp-confirm')?.value;
    const errEl   = document.getElementById('rp-error');
    const btn     = document.querySelector('.reset-wrap .settings-btn');
    errEl.textContent = '';

    if (!pass || pass.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; return; }
    if (pass !== confirm)          { errEl.textContent = 'Passwords do not match.'; return; }

    btn.disabled = true; btn.textContent = 'Updating…';
    try {
      if (isMock()) {
        UI.toast('Password updated (demo mode)!', 'success');
        Router.go('/'); return;
      }
      const { error } = await sb.auth.updateUser({ password: pass });
      if (error) throw error;
      UI.toast('Password updated! You are now signed in.', 'success');
      Router.go('/');
    } catch(e) {
      errEl.textContent = e.message || 'Something went wrong.';
      btn.disabled = false; btn.textContent = 'Update password';
    }
  },

  async _submitResetRequest() {
    const email = document.getElementById('rp-email')?.value?.trim();
    const errEl = document.getElementById('rp-error');
    const btn   = document.querySelector('.reset-wrap .settings-btn');
    errEl.textContent = '';

    if (!email) { errEl.textContent = 'Please enter your email address.'; return; }

    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      if (isMock()) {
        // Replace the card with a success state
        document.querySelector('.reset-card').innerHTML = `
          <div class="reset-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
          <div class="reset-title">Check your email</div>
          <div class="reset-sub">We sent a reset link to <strong>${email}</strong>. It expires in 1 hour.<br><br>In demo mode no email is sent — paste your real Supabase credentials to test this.</div>
          <button class="settings-btn outline" style="width:100%;margin-top:16px;justify-content:center" onclick="Router.go('/')">Back to home</button>`;
        return;
      }
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname + '#!/reset-password',
      });
      if (error) throw error;
      document.querySelector('.reset-card').innerHTML = `
        <div class="reset-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <div class="reset-title">Check your email</div>
        <div class="reset-sub">We sent a reset link to <strong>${email}</strong>. It expires in 1 hour. Check your spam folder if you don't see it.</div>
        <button class="settings-btn outline" style="width:100%;margin-top:16px;justify-content:center" onclick="Router.go('/')">Back to home</button>`;
    } catch(e) {
      errEl.textContent = e.message || 'Failed to send reset email.';
      btn.disabled = false; btn.textContent = 'Send reset link';
    }
  },

  // ── 404 ──
  notFound(app) {
    app.innerHTML = `
      <div class="error-page">
        <div class="error-page-code">404</div>
        <div class="error-page-title">This page doesn't exist</div>
        <div class="error-page-body">The story you're looking for may have moved, been unpublished, or never existed.</div>
        <button class="btn-back" onclick="Router.go('/')">← Back to home</button>
      </div>
      ${UI.footerHTML()}`;
  },

  // ── ERROR ──
  error(app, title, detail) {
    app.innerHTML = `
      <div class="error-page">
        <div class="error-page-code" style="font-size:48px;opacity:.6">⚠</div>
        <div class="error-page-title">${title}</div>
        <div class="error-page-body">${detail || 'Something went wrong. Please try again.'}</div>
        <button class="btn-back" onclick="Router.go('/')">← Back to home</button>

};

// DRAFT EDITOR CONTROLLER
// ═══════════════════════════════════════════
const DraftEditor = {
  _currentId: null,
  _autoSaveTimer: null,

  _collect(id) {
    return {
      id:       id || undefined,
      type:     document.getElementById('de-type')?.value || 'article',
      title:    document.getElementById('de-title')?.value?.trim() || '',
      category: document.getElementById('de-category')?.value?.trim() || null,
      body:     document.getElementById('de-body')?.value || '',
      status:   'draft',
    };
  },

  async save(id, silent = false) {
    const data = this._collect(id);
    const statusEl = document.getElementById('de-status');
    if (statusEl) { statusEl.textContent = 'Saving…'; statusEl.className = 'de-status'; }
    try {
      const saved = await Data.saveDraft(data);
      if (!this._currentId && saved?.id) {
        this._currentId = saved.id;
        history.replaceState(null, '', window.location.pathname + `#!/draft/${saved.id}`);
      }
      if (statusEl) { statusEl.textContent = 'Saved ' + new Date().toLocaleTimeString(); statusEl.className = 'de-status saved'; }
      if (!silent) UI.toast('Draft saved!', 'success');
    } catch(e) {
      if (statusEl) { statusEl.textContent = 'Save failed'; statusEl.className = 'de-status'; }
      if (!silent) UI.toast('Save failed: ' + e.message, 'error');
    }
  },

  async saveAndPublish(id) {
    const data = this._collect(id);
    if (!data.title) { UI.toast('Add a title before publishing.', 'error'); return; }
    data.status = 'published';
    data.published_at = new Date().toISOString();
    try {
      const saved = await Data.saveDraft(data);
      if (saved?.id) await Data.publishDraft(saved.id);
      clearInterval(this._autoSaveTimer);
      UI.toast('Published!', 'success');
      Router.go(`/${data.type}/${saved?.id || id}`);
    } catch(e) {
      UI.toast('Publish failed: ' + e.message, 'error');
    }
  },

  async publish(draftId, title) {
    if (!confirm(`Publish "${title}"?`)) return;
    try {
      await Data.publishDraft(draftId);
      document.getElementById('draft-card-' + draftId)?.remove();
      UI.toast('Published!', 'success');
    } catch(e) {
      UI.toast('Failed: ' + e.message, 'error');
    }
  },

  async deleteDraft(draftId, title) {
    if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
    try {
      await Data.deleteDraft(draftId);
      document.getElementById('draft-card-' + draftId)?.remove();
      UI.toast('Draft deleted.', 'success');
    } catch(e) {
      UI.toast('Delete failed: ' + e.message, 'error');
    }
  },
};

// SETTINGS CONTROLLER
// ═══════════════════════════════════════════
const Settings = {

  previewAvatar(url) {
    const el = document.getElementById('settings-avatar-preview');
    if (!el) return;
    if (url && url.startsWith('http')) {
      el.innerHTML = `<img src="${url}" alt="avatar" onerror="this.style.display='none'">`;
    } else {
      const name = document.getElementById('s-fullname')?.value || Auth.currentUser?.email || '?';
      el.innerHTML = name[0].toUpperCase();
    }
  },

  async saveProfile() {
    const btn = document.querySelector('[onclick="Settings.saveProfile()"]');
    const msg = document.getElementById('s-profile-msg');
    const full_name  = document.getElementById('s-fullname')?.value?.trim();
    const username   = document.getElementById('s-username')?.value?.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_');
    const bio        = document.getElementById('s-bio')?.value?.trim() || null;
    const avatar_url = document.getElementById('s-avatar')?.value?.trim() || null;

    if (!full_name) { msg.className='settings-msg error'; msg.textContent='Name is required.'; return; }

    btn.disabled = true; btn.textContent = 'Saving…';
    msg.textContent = '';

    try {
      if (isMock()) {
        State.profile = { ...(State.profile || {}), full_name, username, bio, avatar_url };
        Auth._updateNavUI();
        msg.className='settings-msg success'; msg.textContent='Profile saved.';
        return;
      }
      const { error } = await sb.from('profiles').upsert({
        id: Auth.userId,
        full_name, username, bio, avatar_url,
        email: Auth.currentUser.email,
      }, { onConflict: 'id' });
      if (error) throw error;
      State.profile = { ...(State.profile || {}), full_name, username, bio, avatar_url };
      Auth._updateNavUI();
      msg.className='settings-msg success'; msg.textContent='Profile saved.';
    } catch(e) {
      msg.className='settings-msg error';
      msg.textContent = e.message?.includes('username') ? 'That username is already taken.' : (e.message || 'Save failed.');
    } finally {
      btn.disabled = false; btn.textContent = 'Save profile';
    }
  },

  async changePassword() {
    const btn = document.querySelector('[onclick="Settings.changePassword()"]');
    const msg = document.getElementById('s-pass-msg');
    const np  = document.getElementById('s-newpass')?.value;
    const cp  = document.getElementById('s-confirmpass')?.value;

    msg.textContent = '';
    if (!np) { msg.className='settings-msg error'; msg.textContent='Enter a new password.'; return; }
    if (np.length < 6) { msg.className='settings-msg error'; msg.textContent='Password must be at least 6 characters.'; return; }
    if (np !== cp) { msg.className='settings-msg error'; msg.textContent='Passwords do not match.'; return; }
    if (isMock()) { msg.className='settings-msg success'; msg.textContent='Password updated (demo mode).'; return; }

    btn.disabled = true; btn.textContent = 'Updating…';
    try {
      const { error } = await sb.auth.updateUser({ password: np });
      if (error) throw error;
      document.getElementById('s-newpass').value = '';
      document.getElementById('s-confirmpass').value = '';
      msg.className='settings-msg success'; msg.textContent='Password updated successfully.';
    } catch(e) {
      msg.className='settings-msg error'; msg.textContent = e.message || 'Update failed.';
    } finally {
      btn.disabled = false; btn.textContent = 'Update password';
    }
  },

  unlockAdmin() {
    const input = document.getElementById('s-adminpass');
    const msg   = document.getElementById('s-admin-msg');
    const val   = input?.value || '';

    if (val === ADMIN_PASS) {
      sessionStorage.setItem('mv_admin_auth', ADMIN_PASS);
      UI.toast('Admin access granted!', 'success');
      Router.go('/settings'); // re-render to show unlocked state
    } else {
      if (msg) { msg.className='settings-msg error'; msg.textContent='Incorrect passphrase. Access denied.'; }
      if (input) { input.value=''; input.focus(); input.style.borderColor='rgba(248,113,113,.5)'; setTimeout(()=>input.style.borderColor='',1500); }
    }
  },

  lockAdmin() {
    sessionStorage.removeItem('mv_admin_auth');
    UI.toast('Admin session ended.', 'success');
    Router.go('/settings');
  },
};

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <div class="editor-title" style="margin:0">${isNew ? 'New post' : 'Edit post'}</div>
        <button onclick="Admin.closeEditor()" style="background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;line-height:1">×</button>
      </div>

      <div class="editor-row">
        <div class="editor-field">
          <label class="editor-label">Type</label>
          <select class="editor-select" id="ef-type">
            <option value="article" ${post?.type==='article'?'selected':''}>Article</option>
            <option value="video"   ${post?.type==='video'?'selected':''}>Video</option>
            <option value="story"   ${post?.type==='story'?'selected':''}>Story</option>
            <option value="thought" ${post?.type==='thought'?'selected':''}>Thought</option>
          </select>
        </div>
        <div class="editor-field">
          <label class="editor-label">Status</label>
          <select class="editor-select" id="ef-status">
            <option value="draft"     ${(!post||post?.status==='draft')?'selected':''}>Draft</option>
            <option value="published" ${post?.status==='published'?'selected':''}>Published</option>
          </select>
        </div>
      </div>

      <div class="editor-field">
        <label class="editor-label">Title *</label>
        <input class="editor-input" id="ef-title" type="text" value="${(post?.title||'').replace(/"/g,'&quot;')}" placeholder="Post title">
      </div>

      <div class="editor-row">
        <div class="editor-field">
          <label class="editor-label">Category</label>
          <input class="editor-input" id="ef-category" type="text" value="${post?.category||''}" placeholder="e.g. Education, Culture">
        </div>
        <div class="editor-field">
          <label class="editor-label">Read time (minutes)</label>
          <input class="editor-input" id="ef-read-time" type="number" min="1" value="${post?.read_time||''}" placeholder="5">
        </div>
      </div>

      <div class="editor-field">
        <label class="editor-label">Cover image URL</label>
        <input class="editor-input" id="ef-cover" type="url" value="${post?.cover_image||''}" placeholder="https://images.unsplash.com/…">
      </div>

      <div class="editor-field" id="ef-video-url-wrap" style="${post?.type!=='video'?'display:none':''}">
        <label class="editor-label">Video embed URL</label>
        <input class="editor-input" id="ef-video-url" type="url" value="${post?.video_url||''}" placeholder="https://www.youtube.com/embed/…">
      </div>

      <div class="editor-field">
        <label class="editor-label">Excerpt / subtitle</label>
        <input class="editor-input" id="ef-excerpt" type="text" value="${(post?.excerpt||'').replace(/"/g,'&quot;')}" placeholder="One-sentence summary">
      </div>

      <div class="editor-field">
        <label class="editor-label">Body (HTML supported)</label>
        <textarea class="editor-input editor-textarea" id="ef-body">${post?.body||''}</textarea>
      </div>

      <div class="editor-error" id="ef-error"></div>

      <div class="editor-footer">
        <button class="admin-btn" onclick="Admin.closeEditor()">Cancel</button>
        <button class="admin-btn primary" id="ef-save-btn" onclick="Admin.savePost('${postId||''}')">
          ${isNew ? 'Create post' : 'Save changes'}
        </button>
      </div>`;

    // Show/hide video URL field on type change
    document.getElementById('ef-type')?.addEventListener('change', e => {
      document.getElementById('ef-video-url-wrap').style.display = e.target.value === 'video' ? '' : 'none';
    });

    overlay.classList.remove('hidden');
    document.getElementById('ef-title')?.focus();
  },

  closeEditor() {
    document.getElementById('editor-overlay')?.classList.add('hidden');
  },

  async savePost(postId) {
    const btn = document.getElementById('ef-save-btn');
    const errEl = document.getElementById('ef-error');
    const title = document.getElementById('ef-title')?.value?.trim();

    errEl.textContent = '';
    if (!title) { errEl.textContent = 'Title is required.'; return; }

    btn.disabled = true;
    btn.textContent = 'Saving…';

    const postData = {
      type:        document.getElementById('ef-type')?.value,
      status:      document.getElementById('ef-status')?.value,
      title,
      category:    document.getElementById('ef-category')?.value?.trim() || null,
      read_time:   parseInt(document.getElementById('ef-read-time')?.value) || null,
      cover_image: document.getElementById('ef-cover')?.value?.trim() || null,
      video_url:   document.getElementById('ef-video-url')?.value?.trim() || null,
      excerpt:     document.getElementById('ef-excerpt')?.value?.trim() || null,
      body:        document.getElementById('ef-body')?.value || null,
      slug:        title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '-' + Date.now(),
    };

    if (postId) {
      postData.id = postId;
      delete postData.slug; // don't overwrite existing slug
    }
    if (postData.status === 'published' && !postData.id) {
      postData.published_at = new Date().toISOString();
    }

    try {
      const saved = await Data.adminSavePost(postData);
      Admin.closeEditor();
      UI.toast(postId ? 'Post saved!' : 'Post created!', 'success');
      // Refresh CMS table
      const posts = await Data.adminGetAllPosts();
      Admin._allPosts = posts;
      const tbody = document.getElementById('cms-tbody');
      if (tbody) tbody.innerHTML = posts.map(p => Pages._cmsRow(p)).join('');
    } catch(e) {
      errEl.textContent = e.message || 'Save failed.';
      btn.disabled = false;
      btn.textContent = postId ? 'Save changes' : 'Create post';
    }
  },

  async toggleStatus(postId, currentStatus) {
    const row = document.getElementById('row-' + postId);
    if (!row) return;
    try {
      const newStatus = await Data.adminToggleStatus(postId, currentStatus);
      // Update in _allPosts
      const p = Admin._allPosts.find(p => p.id === postId);
      if (p) p.status = newStatus;
      // Re-render just this row
      if (p) row.outerHTML = Pages._cmsRow(p);
      UI.toast(newStatus === 'published' ? 'Post published!' : 'Post unpublished.', 'success');
    } catch(e) {
      UI.toast('Failed: ' + e.message, 'error');
    }
  },

  async deletePost(postId, title) {
    if (!confirm('Delete "' + title + '"? This cannot be undone.')) return;
    try {
      await Data.adminDeletePost(postId);
      Admin._allPosts = Admin._allPosts.filter(p => p.id !== postId);
      document.getElementById('row-' + postId)?.remove();
      UI.toast('Post deleted.', 'success');
    } catch(e) {
      UI.toast('Delete failed: ' + e.message, 'error');
    }
  },

  filterCMS() {
    const type   = document.getElementById('cms-filter')?.value || 'all';
    const status = document.getElementById('cms-status-filter')?.value || 'all';
    document.querySelectorAll('#cms-tbody tr').forEach(row => {
      const matchType   = type   === 'all' || row.dataset.type   === type;
      const matchStatus = status === 'all' || row.dataset.status === status;
      row.style.display = (matchType && matchStatus) ? '' : 'none';
    });
  },

  async setRole(userId, role) {
    try {
      await Data.adminSetUserRole(userId, role);
      const badge = document.querySelector('#user-row-' + userId + ' .badge');
      if (badge) {
        badge.className = 'badge badge-' + role;
        badge.textContent = role;
      }
      UI.toast('Role updated to ' + role + '.', 'success');
    } catch(e) {
      UI.toast('Failed: ' + e.message, 'error');
    }
  },
};

// ═══════════════════════════════════════════
// GLOBAL EVENT DELEGATION
// ═══════════════════════════════════════════
document.addEventListener('click', (e) => {
  const navLink = e.target.closest('.nav-link[data-route]');
  if (navLink) { e.preventDefault(); Router.go(navLink.dataset.route); }
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
window.addEventListener('scroll', () => {
  document.querySelector('.nav')?.classList.toggle('scrolled', window.scrollY > 20);
}, { passive: true });

(async () => {
  await Auth.init();
  Router.init();
})();
</script>
</body>
</html>
